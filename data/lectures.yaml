blocks:
  - roman: I
    title: Podstawy sieci neuronowych
    title_en: Neural network foundations
    hours: "8 h"
    accent: indigo
    summary_pl: "Zbudujesz prostą sieć MLP i poznasz najważniejsze techniki potrzebne do jej skutecznego trenowania, oceny i ulepszania."
    summary_en: "You will build a simple MLP and learn the key techniques for training, evaluating, and improving it effectively."
    items:
      - nr: "1"
        topic: Płytka sieć MLP. Uczenie metodą propagacji wstecznej
        hours: "2 h"
      - nr: "2"
        topic: Algorytm propagacji wstecznej w ujęciu macierzowym
        hours: "2 h"
      - nr: "3–4"
        topic: Techniki poprawiające uczenie i uogólnianie (regularyzacja, optymalizacja, hiperparametry)
        hours: "4 h"
    tags: [MLP, Backprop, SGD, Adam, Dropout, BatchNorm]

  - roman: II
    title: Sieci konwolucyjne i modele generatywne
    title_en: Convolutional networks & generative models
    hours: "6 h"
    accent: plum
    summary_pl: "Nauczysz się budować konwolucyjne sieci neuronowe do analizy obrazów, stosować uczenie transferowe, wykorzystywać autokodery do uczenia reprezentacji oraz pracować z modelami generatywnymi, takimi jak VAE i sieci GAN."
    summary_en: "You will learn to build convolutional neural networks for image analysis, apply transfer learning, use autoencoders for representation learning, and work with generative models such as VAE and GAN networks."
    items:
      - nr: "5"
        topic: Sieci konwolucyjne — architektura, transfer wiedzy, znane sieci
        hours: "2 h"
      - nr: "6"
        topic: Autokoder, reprezentacja ukryta, uczenie nienadzorowane
        hours: "2 h"
      - nr: "7"
        topic: Wprowadzenie do sieci generatywnych (VAE, GAN)
        hours: "2 h"
    tags: [CNN, ResNet, Transfer Learning, Autoencoder, VAE, GAN]

  - roman: III
    title: Sekwencje, uwaga i Transformery
    title_en: Sequences, attention & Transformers
    hours: "4 h"
    accent: ochre
    summary_pl: "Prześledzisz rozwój modeli sekwencyjnych: od sieci RNN, LSTM i GRU aż po architekturę Transformera, w której rekurencję zastępują mechanizm uwagi i kodowanie pozycyjne."
    summary_en: "You will trace the evolution of sequence models: from RNN, LSTM, and GRU networks to the Transformer architecture, where attention and positional encoding replace recurrence."
    items:
      - nr: "8"
        topic: Sieci rekurencyjne (NLP, mowa). LSTM, GRU, seq2seq
        hours: "2 h"
      - nr: "9–10"
        topic: Mechanizm uwagi i Transformer — architektura, kodowanie kolejności
        hours: "4 h"
    tags: [RNN, LSTM, Attention, Self-Attention, Transformer, BERT, GPT]

  - roman: IV
    title: Tematy zaawansowane
    title_en: Advanced topics
    hours: "12 h"
    accent: forest
    summary_pl: "Poznasz zastosowania głębokiego uczenia ze wzmocnieniem, metody wyjaśniania decyzji modeli oraz techniki wykrywania i segmentacji obiektów na obrazach."
    summary_en: "You will learn the applications of deep reinforcement learning, methods for explaining model decisions, and techniques for detecting and segmenting objects in images."
    items:
      - nr: "11–12"
        topic: Uczenie ze wzmocnieniem z sieciami głębokimi
        hours: "4 h"
      - nr: "13"
        topic: Metody interpretacji sieci neuronowych
        hours: "2 h"
      - nr: "14–15"
        topic: Detekcja i segmentacja obrazów
        hours: "4 h"
    tags: [Deep RL, DQN, Policy Gradient, Grad-CAM, YOLO, U-Net]
