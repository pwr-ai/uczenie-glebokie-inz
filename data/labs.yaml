blocks:
  - roman: I
    title: Podstawy, narzędzia i produkcja
    title_en: Foundations, tooling & production
    range: Lab 1–5
    accent: indigo
    lead_name: dr inż. Kamil Tagowski
    lead_color: indigo
    items:
      - nr: "1"
        topic: NumPy — operacje macierzowe
        details: Operacje na macierzach, broadcasting, wektoryzacja
      - nr: "2"
        topic: Wprowadzenie NN (NumPy)
        details: Implementacja przebiegu w przód i wstecz od zera
      - nr: "3"
        topic: NN w NumPy — cd.
        details: Regularyzacja, dropout, inicjalizacja wag
      - nr: "4"
        topic: NN w PyTorch
        details: Ten sam model — autograd, DataLoader
      - nr: "5"
        topic: Best practices i produkcja
        details: Tracking (WandB/MLflow), porównywanie eksperymentów, reprodukowalność

  - roman: II
    title: Sieci konwolucyjne, modele generatywne i Deep RL
    title_en: ConvNets, generative models & Deep RL
    range: Lab 6–10
    accent: plum
    lead_name: dr inż. Piotr Zieliński
    lead_color: plum
    items:
      - nr: "6"
        topic: Sieci konwolucyjne
        details: Wizualizacje filtrów, splot 2D i 3D, aktywacje
      - nr: "7"
        topic: CNN + regularyzacja
        details: Augmentacja danych, uczenie transferowe, wczesne zatrzymanie
      - nr: "8"
        topic: Autokoder, VAE, GAN
        details: Modele generatywne — implementacja i porównanie
      - nr: "9"
        topic: Deep RL — podstawy
        details: Gradient polityki, DQN
      - nr: "10"
        topic: Deep RL — cd.
        details: Actor-Critic, zastosowania

  - roman: III
    title: Sekwencje, Transformery, wyjaśnialność i ataki adwersarialne
    title_en: Sequences, Transformers, explainability & adversarial attacks
    range: Lab 11–15
    accent: teal
    lead_name: mgr inż. Jan Jakubik
    lead_color: teal
    items:
      - nr: "11"
        topic: Sieci rekurencyjne
        details: RNN, LSTM, GRU — implementacja i zastosowania
      - nr: "12"
        topic: Mechanizm uwagi
        details: Self-attention, cross-attention, wizualizacja wag
      - nr: "13"
        topic: Transformery
        details: Architektura, kodowanie pozycyjne, implementacja
      - nr: "14"
        topic: Wyjaśnialność i bezpieczeństwo
        details: "XAI: Grad-CAM, SHAP, LIME. Bezpieczeństwo modeli"
      - nr: "15"
        topic: Ataki adwersarialne
        details: FGSM, PGD, obrona przed atakami
