<!doctype html>
<html lang="pl" data-lang="pl">
  <head>
    {{ partial "head.html" . }}
  </head>
  <body>
    {{/* Under-construction strip */}}
    <div class="build-banner">
      <div class="wrap">
        <svg class="dot" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
          <path d="M2 20h20M4 20V10l8-5 8 5v10M9 20v-5h6v5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <b data-i18n data-pl="Strona w budowie" data-en="Site under construction">Strona w budowie</b>
        <span class="more" data-i18n
          data-pl="· treści kursu mogą się jeszcze zmieniać · finalna wersja przed początkiem semestru zimowego"
          data-en="· course content may still change · final version before the winter semester">· treści kursu mogą się jeszcze zmieniać · finalna wersja przed początkiem semestru zimowego</span>
      </div>
    </div>

    {{ partial "nav.html" . }}

    <div id="top"></div>

    <main>
      {{ block "main" . }}{{ end }}
    </main>

    {{ partial "footer.html" . }}

    <script src="{{ "js/app.js" | relURL }}" defer></script>
  </body>
</html>
