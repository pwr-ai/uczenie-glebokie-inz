<svg viewBox="0 0 800 320" preserveAspectRatio="xMidYMid meet" class="h-full w-full">
  <defs>
    <linearGradient id="amlp-edge" x1="0" x2="1">
      <stop offset="0" stop-color="#a78bfa" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0.35"/>
    </linearGradient>
    <radialGradient id="amlp-node-v" cx="0.3" cy="0.3"><stop offset="0" stop-color="#c4b5fd"/><stop offset="1" stop-color="#7c3aed"/></radialGradient>
    <radialGradient id="amlp-node-f" cx="0.3" cy="0.3"><stop offset="0" stop-color="#f0abfc"/><stop offset="1" stop-color="#c026d3"/></radialGradient>
    <radialGradient id="amlp-node-s" cx="0.3" cy="0.3"><stop offset="0" stop-color="#7dd3fc"/><stop offset="1" stop-color="#0284c7"/></radialGradient>
    <filter id="amlp-glow"><feGaussianBlur stdDeviation="2.5"/></filter>
    <marker id="amlp-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#71717a"/>
    </marker>
  </defs>

  {{/* ============= INPUT — vector of features with numeric values ============= */}}
  {{ $feats := slice
      (dict "name" "x₁" "val" 0.82)
      (dict "name" "x₂" "val" 0.14)
      (dict "name" "x₃" "val" 0.56)
      (dict "name" "x₄" "val" 0.33) }}
  <g>
    <rect x="20" y="40" width="170" height="240" rx="10" fill="#0a0a0a" stroke="#3f3f46" stroke-width="1"/>
    <text x="105" y="30" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" fill="#a1a1aa">wektor cech</text>
    {{ range $i, $f := $feats }}
      {{ $y := add 68 (mul $i 52) }}
      <text x="38" y="{{ add $y 5 }}" font-family="JetBrains Mono, monospace" font-size="14" font-weight="bold" fill="#a78bfa">{{ $f.name }}</text>
      <rect x="60" y="{{ $y }}" width="110" height="10" rx="3" fill="#18181b" stroke="#27272a" stroke-width="0.8"/>
      <rect x="60" y="{{ $y }}" width="{{ mul $f.val 110 }}" height="10" rx="3" fill="#38bdf8" opacity="0.8"/>
      <text x="65" y="{{ add $y 26 }}" font-family="JetBrains Mono, monospace" font-size="10" fill="#71717a">{{ printf "%.2f" $f.val }}</text>
    {{ end }}
  </g>

  {{/* arrow from input panel → network */}}
  <path d="M 200 160 L 230 160" stroke="#71717a" stroke-width="1.5" marker-end="url(#amlp-arr)"/>

  {{/* ============= NETWORK layers ============= */}}
  {{ $l1 := slice 80 140 200 260 }}
  {{ $l2 := slice 110 170 230 }}
  {{ $l3 := slice 130 210 }}

  {{/* edges */}}
  <g stroke="url(#amlp-edge)" stroke-width="1.2">
    {{ range $y1 := $l1 }}{{ range $y2 := $l2 }}<line x1="260" y1="{{ $y1 }}" x2="430" y2="{{ $y2 }}" />{{ end }}{{ end }}
    {{ range $y1 := $l2 }}{{ range $y2 := $l3 }}<line x1="430" y1="{{ $y1 }}" x2="600" y2="{{ $y2 }}" />{{ end }}{{ end }}
  </g>

  {{/* forward pulses */}}
  <g filter="url(#amlp-glow)">
    {{ range $i, $y := $l1 }}
      {{ $yTarget := index $l2 (mod $i 3) }}
      <circle r="4" fill="#a78bfa">
        <animateMotion dur="5s" begin="{{ mul $i 0.35 }}s" repeatCount="indefinite"
          path="M 260 {{ $y }} L 430 {{ $yTarget }}"/>
      </circle>
    {{ end }}
    {{ range $i, $y := $l2 }}
      {{ $yTarget := index $l3 (mod $i 2) }}
      <circle r="4" fill="#e879f9">
        <animateMotion dur="4.5s" begin="{{ add 0.6 (mul $i 0.4) }}s" repeatCount="indefinite"
          path="M 430 {{ $y }} L 600 {{ $yTarget }}"/>
      </circle>
    {{ end }}
  </g>

  {{/* nodes */}}
  {{ range $y := $l1 }}<circle cx="260" cy="{{ $y }}" r="10" fill="url(#amlp-node-v)"/>{{ end }}
  {{ range $y := $l2 }}<circle cx="430" cy="{{ $y }}" r="10" fill="url(#amlp-node-f)"/>{{ end }}
  {{ range $y := $l3 }}<circle cx="600" cy="{{ $y }}" r="12" fill="url(#amlp-node-s)"/>{{ end }}

  {{/* layer labels */}}
  <g font-family="JetBrains Mono, monospace" font-size="12" fill="#71717a">
    <text x="260" y="305" text-anchor="middle">wejście</text>
    <text x="430" y="305" text-anchor="middle">warstwa ukryta</text>
    <text x="600" y="305" text-anchor="middle">wyjście</text>
  </g>

  {{/* arrow to output panel */}}
  <path d="M 625 160 L 655 160" stroke="#71717a" stroke-width="1.5" marker-end="url(#amlp-arr)"/>

  {{/* ============= OUTPUT — class probabilities ============= */}}
  <g>
    <rect x="665" y="80" width="115" height="160" rx="10" fill="#0a0a0a" stroke="#3f3f46" stroke-width="1"/>
    <text x="723" y="70" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" fill="#a1a1aa">predykcja</text>

    {{/* class 1 (winning) */}}
    <g transform="translate(675, 110)">
      <text x="0" y="0" font-family="JetBrains Mono, monospace" font-size="11" fill="#22c55e" font-weight="bold">klasa A</text>
      <rect x="0" y="6" width="95" height="10" rx="3" fill="#18181b" stroke="#27272a"/>
      <rect x="0" y="6" width="87" height="10" rx="3" fill="rgba(34,197,94,0.85)" stroke="#22c55e" stroke-width="0.8"/>
      <text x="95" y="28" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="11" fill="#22c55e" font-weight="bold">0.92</text>
    </g>

    {{/* class 2 (losing) */}}
    <g transform="translate(675, 170)">
      <text x="0" y="0" font-family="JetBrains Mono, monospace" font-size="11" fill="#71717a">klasa B</text>
      <rect x="0" y="6" width="95" height="10" rx="3" fill="#18181b" stroke="#27272a"/>
      <rect x="0" y="6" width="8" height="10" rx="3" fill="rgba(113,113,122,0.4)" stroke="#52525b" stroke-width="0.8"/>
      <text x="95" y="28" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="11" fill="#71717a">0.08</text>
    </g>
  </g>
</svg>
