<svg viewBox="0 0 800 320" preserveAspectRatio="xMidYMid meet" class="h-full w-full"
     font-family="Inter, ui-sans-serif, system-ui, sans-serif">
  <defs>
    <linearGradient id="amlp-edge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a78bfa" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0.55"/>
    </linearGradient>
    <marker id="amlp-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="currentColor"/>
    </marker>
  </defs>

  {{/* ============= LEFT PANEL — patient features (heart disease risk) ============= */}}
  {{ $feats := slice
      (dict "name" "wiek"         "val" "56 lat"       "bar" 0.66)
      (dict "name" "cholesterol"  "val" "239 mg/dL"   "bar" 0.80)
      (dict "name" "ciśnienie"    "val" "145 mmHg"    "bar" 0.73)
      (dict "name" "tętno (max)"  "val" "162 /min"    "bar" 0.85) }}
  <g>
    <rect x="20" y="50" width="200" height="225" rx="12"
          fill="rgba(167,139,250,0.05)" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
    <text x="120" y="70" text-anchor="middle" font-size="13" font-weight="600"
          fill="currentColor" opacity="0.8">dane pacjenta</text>
    <text x="120" y="84" text-anchor="middle" font-size="10"
          fill="currentColor" opacity="0.5">4 cechy tabelaryczne</text>
    <line x1="36" y1="94" x2="204" y2="94" stroke="rgba(167,139,250,0.18)" stroke-width="1"/>
    {{ range $i, $f := $feats }}
      {{ $y := add 108 (mul $i 42) }}
      <text x="36" y="{{ add $y 4 }}" font-size="12" font-weight="600"
            fill="currentColor" opacity="0.85">{{ $f.name }}</text>
      <text x="184" y="{{ add $y 4 }}" text-anchor="end"
            font-family="JetBrains Mono, monospace"
            font-size="10" fill="currentColor" opacity="0.6">{{ $f.val }}</text>
      <rect x="36" y="{{ add $y 12 }}" width="148" height="8" rx="3"
            fill="rgba(113,113,122,0.15)" stroke="rgba(113,113,122,0.3)" stroke-width="0.8"/>
      <rect x="36" y="{{ add $y 12 }}" width="{{ mul $f.bar 148 }}" height="8" rx="3"
            fill="#a78bfa" opacity="0.85"/>
    {{ end }}
  </g>

  {{/* arrow panel → network */}}
  <g color="currentColor" opacity="0.6">
    <path d="M 230 160 L 250 160" stroke="currentColor" stroke-width="1.5"
          marker-end="url(#amlp-arr)"/>
  </g>

  {{/* ============= NETWORK — 4 layers: input + 2 hidden + output ============= */}}
  {{ $l1 := slice 80 140 200 260 }}
  {{ $l2 := slice 90 150 210 270 }}
  {{ $l3 := slice 110 170 230 }}
  {{ $l4 := slice 130 210 }}
  {{ $xs := slice 260 380 500 620 }}
  {{ $ncolors := slice "#8b5cf6" "#a855f7" "#d946ef" "#0ea5e9" }}

  {{/* edges */}}
  <g stroke="url(#amlp-edge)" stroke-width="1" opacity="0.55">
    {{ range $y1 := $l1 }}{{ range $y2 := $l2 }}
      <line x1="{{ index $xs 0 }}" y1="{{ $y1 }}" x2="{{ index $xs 1 }}" y2="{{ $y2 }}"/>
    {{ end }}{{ end }}
    {{ range $y1 := $l2 }}{{ range $y2 := $l3 }}
      <line x1="{{ index $xs 1 }}" y1="{{ $y1 }}" x2="{{ index $xs 2 }}" y2="{{ $y2 }}"/>
    {{ end }}{{ end }}
    {{ range $y1 := $l3 }}{{ range $y2 := $l4 }}
      <line x1="{{ index $xs 2 }}" y1="{{ $y1 }}" x2="{{ index $xs 3 }}" y2="{{ $y2 }}"/>
    {{ end }}{{ end }}
  </g>

  {{/* forward pulses (soft violet) */}}
  <g>
    {{ range $i, $y := $l1 }}
      {{ $yT := index $l2 (mod $i 4) }}
      <circle r="3.5" fill="#c4b5fd">
        <animateMotion dur="5s" begin="{{ mul $i 0.3 }}s" repeatCount="indefinite"
          path="M {{ index $xs 0 }} {{ $y }} L {{ index $xs 1 }} {{ $yT }}"/>
      </circle>
    {{ end }}
    {{ range $i, $y := $l2 }}
      {{ $yT := index $l3 (mod $i 3) }}
      <circle r="3.5" fill="#c4b5fd">
        <animateMotion dur="5s" begin="{{ add 0.5 (mul $i 0.3) }}s" repeatCount="indefinite"
          path="M {{ index $xs 1 }} {{ $y }} L {{ index $xs 2 }} {{ $yT }}"/>
      </circle>
    {{ end }}
    {{ range $i, $y := $l3 }}
      {{ $yT := index $l4 (mod $i 2) }}
      <circle r="3.5" fill="#c4b5fd">
        <animateMotion dur="5s" begin="{{ add 1.0 (mul $i 0.35) }}s" repeatCount="indefinite"
          path="M {{ index $xs 2 }} {{ $y }} L {{ index $xs 3 }} {{ $yT }}"/>
      </circle>
    {{ end }}
  </g>

  {{/* nodes */}}
  {{ range $y := $l1 }}<circle cx="{{ index $xs 0 }}" cy="{{ $y }}" r="9"
    fill="{{ index $ncolors 0 }}" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>{{ end }}
  {{ range $y := $l2 }}<circle cx="{{ index $xs 1 }}" cy="{{ $y }}" r="9"
    fill="{{ index $ncolors 1 }}" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>{{ end }}
  {{ range $y := $l3 }}<circle cx="{{ index $xs 2 }}" cy="{{ $y }}" r="9"
    fill="{{ index $ncolors 2 }}" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>{{ end }}
  {{ range $y := $l4 }}<circle cx="{{ index $xs 3 }}" cy="{{ $y }}" r="11"
    fill="{{ index $ncolors 3 }}" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>{{ end }}

  {{/* layer labels */}}
  <g font-size="10" fill="currentColor" opacity="0.55">
    <text x="{{ index $xs 0 }}" y="306" text-anchor="middle">wejście</text>
    <text x="{{ index $xs 1 }}" y="306" text-anchor="middle">ukryta 1</text>
    <text x="{{ index $xs 2 }}" y="306" text-anchor="middle">ukryta 2</text>
    <text x="{{ index $xs 3 }}" y="306" text-anchor="middle">wyjście</text>
  </g>

  {{/* arrow network → output */}}
  <g color="currentColor" opacity="0.6">
    <path d="M 645 160 L 665 160" stroke="currentColor" stroke-width="1.5"
          marker-end="url(#amlp-arr)"/>
  </g>

  {{/* ============= RIGHT PANEL — diagnosis verdict ============= */}}
  <g>
    <rect x="675" y="90" width="115" height="165" rx="12"
          fill="rgba(244,63,94,0.05)" stroke="rgba(244,63,94,0.25)" stroke-width="1"/>
    <text x="733" y="110" text-anchor="middle" font-size="13" font-weight="600"
          fill="currentColor" opacity="0.8">predykcja</text>
    <text x="733" y="124" text-anchor="middle" font-size="10"
          fill="currentColor" opacity="0.5">ryzyko choroby serca</text>
    <line x1="685" y1="134" x2="785" y2="134" stroke="rgba(244,63,94,0.18)" stroke-width="1"/>

    {{/* wysokie (winning) */}}
    <g transform="translate(685, 155)">
      <text x="0" y="0" font-size="12" font-weight="700" fill="#dc2626">wysokie</text>
      <text x="95" y="0" text-anchor="end" font-family="JetBrains Mono, monospace"
            font-size="11" fill="#dc2626" font-weight="700">0.89</text>
      <rect x="0" y="8" width="95" height="8" rx="3"
            fill="rgba(113,113,122,0.15)" stroke="rgba(113,113,122,0.3)"/>
      <rect x="0" y="8" width="85" height="8" rx="3" fill="#ef4444" opacity="0.9"/>
    </g>

    {{/* niskie (losing) */}}
    <g transform="translate(685, 210)">
      <text x="0" y="0" font-size="12" font-weight="500" fill="currentColor" opacity="0.55">niskie</text>
      <text x="95" y="0" text-anchor="end" font-family="JetBrains Mono, monospace"
            font-size="11" fill="currentColor" opacity="0.55">0.11</text>
      <rect x="0" y="8" width="95" height="8" rx="3"
            fill="rgba(113,113,122,0.15)" stroke="rgba(113,113,122,0.3)"/>
      <rect x="0" y="8" width="10" height="8" rx="3" fill="currentColor" opacity="0.35"/>
    </g>
  </g>
</svg>
