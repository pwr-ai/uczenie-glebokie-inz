<svg viewBox="0 0 800 320" preserveAspectRatio="xMidYMid meet" class="h-full w-full"
     font-family="Inter, ui-sans-serif, system-ui, sans-serif">
  <defs>
    <linearGradient id="amlp-edge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a78bfa" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0.55"/>
    </linearGradient>
    <marker id="amlp-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="currentColor"/>
    </marker>
  </defs>

  {{/* ============= LEFT PANEL — patient features (heart disease risk) ============= */}}
  {{ $feats := slice
      (dict "name" "wiek"         "val" "56 lat"       "bar" 0.66)
      (dict "name" "cholesterol"  "val" "239 mg/dL"   "bar" 0.80)
      (dict "name" "ciśnienie"    "val" "145 mmHg"    "bar" 0.73)
      (dict "name" "tętno (max)"  "val" "162 /min"    "bar" 0.85) }}
  <g>
    <rect x="20" y="40" width="200" height="270" rx="12"
          fill="rgba(167,139,250,0.05)" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
    <text x="120" y="28" text-anchor="middle" font-size="13" font-weight="600"
          fill="currentColor" opacity="0.75">dane pacjenta</text>
    <text x="120" y="43" text-anchor="middle" font-size="10"
          fill="currentColor" opacity="0.5">4 cechy tabelaryczne</text>
    {{ range $i, $f := $feats }}
      {{ $y := add 78 (mul $i 56) }}
      <text x="36" y="{{ add $y 4 }}" font-size="12" font-weight="600"
            fill="currentColor" opacity="0.85">{{ $f.name }}</text>
      <text x="184" y="{{ add $y 4 }}" text-anchor="end"
            font-family="JetBrains Mono, monospace"
            font-size="10" fill="currentColor" opacity="0.55">{{ $f.val }}</text>
      <rect x="36" y="{{ add $y 14 }}" width="148" height="9" rx="3"
            fill="rgba(113,113,122,0.15)" stroke="rgba(113,113,122,0.3)" stroke-width="0.8"/>
      <rect x="36" y="{{ add $y 14 }}" width="{{ mul $f.bar 148 }}" height="9" rx="3"
            fill="#a78bfa" opacity="0.85"/>
    {{ end }}
  </g>

  {{/* arrow panel → network */}}
  <g color="currentColor" opacity="0.6">
    <path d="M 230 160 L 260 160" stroke="currentColor" stroke-width="1.5"
          marker-end="url(#amlp-arr)"/>
  </g>

  {{/* ============= NETWORK — hero-style nodes & edges ============= */}}
  {{ $l1 := slice 80 140 200 260 }}
  {{ $l2 := slice 110 170 230 }}
  {{ $l3 := slice 130 210 }}
  {{ $ncolors := slice "#c4b5fd" "#d8b4fe" "#7dd3fc" }}

  {{/* edges */}}
  <g stroke="url(#amlp-edge)" stroke-width="1" opacity="0.55">
    {{ range $y1 := $l1 }}{{ range $y2 := $l2 }}
      <line x1="290" y1="{{ $y1 }}" x2="450" y2="{{ $y2 }}"/>
    {{ end }}{{ end }}
    {{ range $y1 := $l2 }}{{ range $y2 := $l3 }}
      <line x1="450" y1="{{ $y1 }}" x2="610" y2="{{ $y2 }}"/>
    {{ end }}{{ end }}
  </g>

  {{/* forward pulses (soft violet, hero style) */}}
  <g>
    {{ range $i, $y := $l1 }}
      {{ $yTarget := index $l2 (mod $i 3) }}
      <circle r="3.5" fill="#c4b5fd">
        <animateMotion dur="5s" begin="{{ mul $i 0.35 }}s" repeatCount="indefinite"
          path="M 290 {{ $y }} L 450 {{ $yTarget }}"/>
      </circle>
    {{ end }}
    {{ range $i, $y := $l2 }}
      {{ $yTarget := index $l3 (mod $i 2) }}
      <circle r="3.5" fill="#c4b5fd">
        <animateMotion dur="4.5s" begin="{{ add 0.6 (mul $i 0.4) }}s" repeatCount="indefinite"
          path="M 450 {{ $y }} L 610 {{ $yTarget }}"/>
      </circle>
    {{ end }}
  </g>

  {{/* nodes (hero style) */}}
  {{ range $y := $l1 }}<circle cx="290" cy="{{ $y }}" r="10"
    fill="{{ index $ncolors 0 }}" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>{{ end }}
  {{ range $y := $l2 }}<circle cx="450" cy="{{ $y }}" r="10"
    fill="{{ index $ncolors 1 }}" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>{{ end }}
  {{ range $y := $l3 }}<circle cx="610" cy="{{ $y }}" r="12"
    fill="{{ index $ncolors 2 }}" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>{{ end }}

  {{/* layer labels */}}
  <g font-size="11" fill="currentColor" opacity="0.55">
    <text x="290" y="306" text-anchor="middle">wejście</text>
    <text x="450" y="306" text-anchor="middle">warstwa ukryta</text>
    <text x="610" y="306" text-anchor="middle">wyjście</text>
  </g>

  {{/* arrow network → output */}}
  <g color="currentColor" opacity="0.6">
    <path d="M 635 160 L 665 160" stroke="currentColor" stroke-width="1.5"
          marker-end="url(#amlp-arr)"/>
  </g>

  {{/* ============= RIGHT PANEL — diagnosis verdict ============= */}}
  <g>
    <rect x="675" y="70" width="115" height="180" rx="12"
          fill="rgba(244,63,94,0.05)" stroke="rgba(244,63,94,0.25)" stroke-width="1"/>
    <text x="733" y="58" text-anchor="middle" font-size="13" font-weight="600"
          fill="currentColor" opacity="0.75">predykcja</text>
    <text x="733" y="73" text-anchor="middle" font-size="10"
          fill="currentColor" opacity="0.5">ryzyko choroby serca</text>

    {{/* podwyższone (winning) */}}
    <g transform="translate(685, 115)">
      <text x="0" y="0" font-size="12" font-weight="700" fill="#dc2626">podwyższone</text>
      <rect x="0" y="7" width="95" height="10" rx="3"
            fill="rgba(113,113,122,0.15)" stroke="rgba(113,113,122,0.3)"/>
      <rect x="0" y="7" width="85" height="10" rx="3" fill="#ef4444" opacity="0.9"/>
      <text x="95" y="32" text-anchor="end" font-family="JetBrains Mono, monospace"
            font-size="11" fill="#dc2626" font-weight="700">0.89</text>
    </g>

    {{/* niskie (losing) */}}
    <g transform="translate(685, 180)">
      <text x="0" y="0" font-size="12" font-weight="500" fill="currentColor" opacity="0.55">niskie</text>
      <rect x="0" y="7" width="95" height="10" rx="3"
            fill="rgba(113,113,122,0.15)" stroke="rgba(113,113,122,0.3)"/>
      <rect x="0" y="7" width="10" height="10" rx="3" fill="currentColor" opacity="0.35"/>
      <text x="95" y="32" text-anchor="end" font-family="JetBrains Mono, monospace"
            font-size="11" fill="currentColor" opacity="0.55">0.11</text>
    </g>
  </g>
</svg>
