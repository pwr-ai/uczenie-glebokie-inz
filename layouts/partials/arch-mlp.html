<svg viewBox="0 0 340 140" class="h-full w-full">
  <defs>
    <linearGradient id="amlp-edge" x1="0" x2="1">
      <stop offset="0" stop-color="#a78bfa" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0.3"/>
    </linearGradient>
    <radialGradient id="amlp-node-v" cx="0.3" cy="0.3"><stop offset="0" stop-color="#c4b5fd"/><stop offset="1" stop-color="#7c3aed"/></radialGradient>
    <radialGradient id="amlp-node-f" cx="0.3" cy="0.3"><stop offset="0" stop-color="#f0abfc"/><stop offset="1" stop-color="#c026d3"/></radialGradient>
    <radialGradient id="amlp-node-s" cx="0.3" cy="0.3"><stop offset="0" stop-color="#7dd3fc"/><stop offset="1" stop-color="#0284c7"/></radialGradient>
  </defs>

  {{ $l1 := slice 25 55 85 115 }}
  {{ $l2 := slice 35 70 105 }}
  {{ $l3 := slice 45 95 }}

  {{/* edges */}}
  <g stroke="url(#amlp-edge)" stroke-width="1">
    {{ range $y1 := $l1 }}{{ range $y2 := $l2 }}<line x1="50" y1="{{ $y1 }}" x2="160" y2="{{ $y2 }}" />{{ end }}{{ end }}
    {{ range $y1 := $l2 }}{{ range $y2 := $l3 }}<line x1="160" y1="{{ $y1 }}" x2="270" y2="{{ $y2 }}" />{{ end }}{{ end }}
  </g>

  {{/* nodes */}}
  {{ range $y := $l1 }}<circle cx="50" cy="{{ $y }}" r="5" fill="url(#amlp-node-v)" />{{ end }}
  {{ range $y := $l2 }}<circle cx="160" cy="{{ $y }}" r="5" fill="url(#amlp-node-f)" />{{ end }}
  {{ range $y := $l3 }}<circle cx="270" cy="{{ $y }}" r="6" fill="url(#amlp-node-s)" />{{ end }}

  {{/* labels */}}
  <g font-family="JetBrains Mono, monospace" font-size="9" fill="#71717a">
    <text x="50" y="135" text-anchor="middle">input</text>
    <text x="160" y="135" text-anchor="middle">hidden</text>
    <text x="270" y="135" text-anchor="middle">output</text>
  </g>

  {{/* class labels */}}
  <g font-family="JetBrains Mono, monospace" font-size="9">
    <text x="284" y="48" fill="#22c55e" font-weight="bold">ham</text>
    <text x="284" y="98" fill="#71717a">spam</text>
  </g>
</svg>
