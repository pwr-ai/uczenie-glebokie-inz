          data-en="<b>Fig. 1 — MLP.</b> A multilayer perceptron with hidden layers estimating risk from input features. Trained by backpropagation in matrix form."><b>Rys. 1 — MLP.</b> Wielowarstwowy perceptron z warstwami ukrytymi estymujący ryzyko na podstawie cech wejściowych. Trenowany propagacją wsteczną w ujęciu macierzowym.</figcaption>

          <rect x="165" y="60" width="60" height="60" rx="2" opacity=".6"/>

      </figure>

          <path d="M44 32 L210 74 M44 148 L210 106"/>
          <path d="M436 32 L270 74 L270 106 L436 148 Z" fill="currentColor" stroke="none" opacity=".12"/>

        <figcaption data-i18n data-pl="<b>Rys. 3 — Autokoder / VAE / GAN.</b> Enkoder kompresuje wejście do reprezentacji ukrytej z, dekoder odtwarza dane. Próbkowanie przestrzeni z pozwala generować nowe przykłady."
          data-en="<b>Fig. 3 — Autoencoder / VAE / GAN.</b> The encoder compresses the input into a latent code z; the decoder reconstructs the data. Sampling the latent space generates new examples."><b>Rys. 3 — Autokoder / VAE / GAN.</b> Enkoder kompresuje wejście do reprezentacji ukrytej z, dekoder odtwarza dane. Próbkowanie przestrzeni z pozwala generować nowe przykłady.</figcaption>
      </figure>

      <figure class="arch-panel" data-panel="3">
        <div class="fig"><svg class="anim-rl" viewBox="0 0 480 180" fill="none" stroke="currentColor" stroke-width="1.3">

          <rect x="294" y="60" width="130" height="58" rx="10"/>

          <path class="rl-stream rl-stream-b" d="M292 98 L194 98" marker-end="url(#rlA)"/>

            <text x="121" y="93">Agent · π</text><text x="359" y="93">Środowisko</text>
          </g>
          <g font-family="var(--font-mono)" font-size="9.5" fill="var(--faint)" stroke="none" text-anchor="middle">
            <text x="240" y="72">akcja</text><text x="240" y="114">stan · nagroda</text>
          </g>
        </svg></div>
        <figcaption data-i18n data-pl="<b>Rys. 4 — Deep RL.</b> Agent obserwuje stan środowiska, wybiera akcję według polityki π i uczy się z nagrody. Pętla agent–środowisko to rdzeń uczenia ze wzmocnieniem (DQN, Actor-Critic)."
          data-en="<b>Fig. 4 — Deep RL.</b> The agent observes the environment state, picks an action under policy π and learns from the reward. The agent–environment loop is the core of reinforcement learning (DQN, Actor-Critic)."><b>Rys. 4 — Deep RL.</b> Agent obserwuje stan środowiska, wybiera akcję według polityki π i uczy się z nagrody. Pętla agent–środowisko to rdzeń uczenia ze wzmocnieniem (DQN, Actor-Critic).</figcaption>

          <g font-family="var(--font-mono)" font-size="12" fill="var(--muted)" stroke="none" text-anchor="middle"><text x="105" y="94">LSTM</text><text x="235" y="94">LSTM</text><text x="365" y="94">LSTM</text></g>
          <g font-family="var(--font-mono)" font-size="10" fill="var(--faint)" stroke="none" text-anchor="middle">

            <text x="105" y="30">y1</text><text x="235" y="30">y2</text><text x="365" y="30">y3</text>

        <figcaption data-i18n data-pl="<b>Rys. 5 — RNN / LSTM.</b> Sieć rekurencyjna przetwarza sekwencję krok po kroku, przekazując stan ukryty między komórkami. LSTM i GRU radzą sobie z długimi zależnościami."
          data-en="<b>Fig. 5 — RNN / LSTM.</b> A recurrent network processes a sequence step by step, passing the hidden state between cells. LSTM and GRU handle long-range dependencies."><b>Rys. 5 — RNN / LSTM.</b> Sieć rekurencyjna przetwarza sekwencję krok po kroku, przekazując stan ukryty między komórkami. LSTM i GRU radzą sobie z długimi zależnościami.</figcaption>
      </figure>
      <!-- Attention -->
      <figure class="arch-panel" data-panel="5">
        <div class="fig"><svg class="anim-attn" viewBox="0 0 480 180" fill="none" stroke="currentColor" stroke-width="1.3">
          <!-- key/value tokens -->
          <g font-family="var(--font-mono)" font-size="11" fill="var(--muted)" stroke="none" text-anchor="middle">
            <text x="60" y="28">Uczenie</text><text x="144" y="28">jest</text><text x="228" y="28">głębokie</text><text x="312" y="28">i</text><text x="396" y="28">ważne</text>
          </g>
          <!-- base edges (every token attends to the query) -->
          <g class="attn-base" opacity=".16">
            <path id="ae0" d="M60 50 L228 138"/><path id="ae1" d="M144 50 L228 138"/><path id="ae2" d="M228 50 L228 138"/><path id="ae3" d="M312 50 L228 138"/><path id="ae4" d="M396 50 L228 138"/>
          </g>
          <!-- weighted overlay: each edge flashes in turn (shifting attention) -->
          <g class="attn-weights" fill="none">
            <use href="#ae0" class="aw" style="--i:0"/><use href="#ae1" class="aw" style="--i:1"/><use href="#ae2" class="aw" style="--i:2"/><use href="#ae3" class="aw" style="--i:3"/><use href="#ae4" class="aw" style="--i:4"/>
          </g>
          <!-- key nodes -->
          <g fill="var(--surface)"><circle cx="60" cy="42" r="6"/><circle cx="144" cy="42" r="6"/><circle cx="228" cy="42" r="6"/><circle cx="312" cy="42" r="6"/><circle cx="396" cy="42" r="6"/></g>
          <!-- focus ring sweeping the attended key -->
          <circle class="attn-focus" cx="60" cy="42" r="11" fill="none" stroke="currentColor" stroke-width="2"/>
          <!-- query token -->
          <circle class="attn-query" cx="228" cy="150" r="10" fill="currentColor"/>
          <text x="228" y="176" font-family="var(--font-mono)" font-size="10" fill="var(--faint)" stroke="none" text-anchor="middle">query token</text>

        <figcaption data-i18n data-pl="<b>Rys. 6 — Self-attention.</b> Każdy token dynamicznie waży pozostałe tokeny sekwencji. Grubość połączeń odpowiada wagom uwagi — fundament Transformera."
          data-en="<b>Fig. 6 — Self-attention.</b> Each token dynamically weights every other token in the sequence. Edge thickness encodes the attention weights — the foundation of the Transformer."><b>Rys. 6 — Self-attention.</b> Każdy token dynamicznie waży pozostałe tokeny sekwencji. Grubość połączeń odpowiada wagom uwagi — fundament Transformera.</figcaption>
      </figure>

          <rect class="cam-glow" x="150" y="30" width="180" height="120" rx="4" fill="url(#cam)" stroke="none"/>
          <path d="M205 120 q15 -55 35 -55 q22 0 18 30 q20 -8 24 6 q12 -3 10 14 l2 25" opacity=".55"/>
          <ellipse class="cam-ring" cx="225" cy="78" rx="26" ry="20" opacity=".7"/>
          <path d="M150 60h180M150 90h180M150 120h180M195 30v120M240 30v120M285 30v120" opacity=".12"/>
        </svg></div>
        <figcaption data-i18n data-pl="<b>Rys. 7 — Grad-CAM.</b> Mapa cieplna gradientów pokazuje, które regiony obrazu najsilniej wpłynęły na decyzję klasyfikatora. Narzędzie wyjaśnialności (XAI)."
          data-en="<b>Fig. 7 — Grad-CAM.</b> A gradient heatmap shows which image regions most influenced the classifier's decision. An explainability (XAI) tool."><b>Rys. 7 — Grad-CAM.</b> Mapa cieplna gradientów pokazuje, które regiony obrazu najsilniej wpłynęły na decyzję klasyfikatora. Narzędzie wyjaśnialności (XAI).</figcaption>
