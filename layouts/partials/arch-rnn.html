<svg viewBox="0 0 800 320" preserveAspectRatio="xMidYMid meet" class="h-full w-full">
  <defs>
    <radialGradient id="arnn-cell" cx="0.5" cy="0.5">
      <stop offset="0" stop-color="#a78bfa" stop-opacity="1"/>
      <stop offset="1" stop-color="#7c3aed" stop-opacity="0.5"/>
    </radialGradient>
    <marker id="arnn-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#71717a"/>
    </marker>
    <filter id="arnn-glow"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>

  {{ $tokens := slice "The" "quick" "brown" "fox" "jumps" }}
  {{ $outs := slice "DET" "ADJ" "ADJ" "NOUN" "VERB" }}
  {{ $centers := slice 110 260 410 560 710 }}

  {{/* column sweep glow */}}
  <rect x="-60" y="40" width="120" height="240" rx="10" fill="rgba(251,191,36,0.1)" opacity="0">
    <animate attributeName="opacity" values="0;0.9;0.9;0;0" keyTimes="0;0.05;0.18;0.2;1" dur="5s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate"
      dur="5s" repeatCount="indefinite" calcMode="discrete"
      keyTimes="0;0.2;0.4;0.6;0.8;1"
      values="110,0; 260,0; 410,0; 560,0; 710,0; 110,0"/>
  </rect>

  {{/* recurrent horizontal arrows between cells */}}
  {{ range $i := (seq 0 3) }}
    {{ $x1 := add (index $centers $i) 40 }}
    {{ $x2 := sub (index $centers (add $i 1)) 40 }}
    <path d="M {{ $x1 }} 170 L {{ $x2 }} 170" stroke="#52525b" stroke-width="1.5" marker-end="url(#arnn-arr)"/>
  {{ end }}

  {{/* per-timestep groups */}}
  {{ range $t := (seq 0 4) }}
    {{ $cx := index $centers $t }}
    {{ $begin := mul $t 1.0 }}

    {{/* vertical arrows */}}
    <path d="M {{ $cx }} 264 L {{ $cx }} 210" stroke="#52525b" stroke-width="1.5" marker-end="url(#arnn-arr)"/>
    <path d="M {{ $cx }} 134 L {{ $cx }} 80" stroke="#52525b" stroke-width="1.5" marker-end="url(#arnn-arr)"/>

    {{/* input x_t */}}
    <g>
      <rect x="{{ sub $cx 52 }}" y="265" width="104" height="36" rx="6" fill="#18181b" stroke="#52525b" stroke-width="1"/>
      <rect x="{{ sub $cx 52 }}" y="265" width="104" height="36" rx="6" fill="rgba(56,189,248,0.22)" stroke="#38bdf8" stroke-width="2" opacity="0">
        <animate attributeName="opacity" values="0;0;1;0"
          keyTimes="0;{{ div $begin 5.0 }};{{ div (add $begin 0.25) 5.0 }};{{ div (add $begin 0.9) 5.0 }}"
          dur="5s" repeatCount="indefinite"/>
      </rect>
      <text x="{{ $cx }}" y="289" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="16" fill="#d4d4d8">{{ index $tokens $t }}</text>
    </g>

    {{/* hidden state h_t */}}
    <g filter="url(#arnn-glow)">
      <rect x="{{ sub $cx 40 }}" y="134" width="80" height="76" rx="10" fill="#27272a" stroke="#52525b" stroke-width="1"/>
      <rect x="{{ sub $cx 40 }}" y="134" width="80" height="76" rx="10" fill="url(#arnn-cell)" opacity="0">
        <animate attributeName="opacity" values="0;0;0.85;0.3;0"
          keyTimes="0;{{ div (add $begin 0.15) 5.0 }};{{ div (add $begin 0.4) 5.0 }};{{ div (add $begin 0.7) 5.0 }};{{ div (add $begin 0.95) 5.0 }}"
          dur="5s" repeatCount="indefinite"/>
      </rect>
      <text x="{{ $cx }}" y="178" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="14" fill="#f4f4f5">h<tspan font-size="10" dy="3">{{ $t }}</tspan></text>
    </g>

    {{/* output y_t */}}
    <g>
      <rect x="{{ sub $cx 48 }}" y="44" width="96" height="36" rx="6" fill="#18181b" stroke="#52525b" stroke-width="1"/>
      <rect x="{{ sub $cx 48 }}" y="44" width="96" height="36" rx="6" fill="rgba(34,197,94,0.18)" stroke="#22c55e" stroke-width="2" opacity="0">
        <animate attributeName="opacity" values="0;0;1;0.3"
          keyTimes="0;{{ div (add $begin 0.55) 5.0 }};{{ div (add $begin 0.75) 5.0 }};{{ div (add $begin 0.95) 5.0 }}"
          dur="5s" repeatCount="indefinite"/>
      </rect>
      <text x="{{ $cx }}" y="68" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="13" fill="#d4d4d8">{{ index $outs $t }}</text>
    </g>
  {{ end }}

  {{/* row labels */}}
  <g font-family="JetBrains Mono, monospace" font-size="13" fill="#71717a">
    <text x="18" y="68">wyjście</text>
    <text x="18" y="178">pamięć</text>
    <text x="18" y="289">wejście</text>
  </g>
</svg>
