<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>{{ .Site.Title }} — Kurs inżynierski · PWr</title>
<meta name="description" content="{{ .Site.Params.description }}" />
<meta name="color-scheme" content="light dark" />

<script>
  // Set theme before first paint to avoid flash of wrong theme
  (function () {
    try {
      var saved = localStorage.getItem("theme");
      var dark = saved ? saved === "dark" : window.matchMedia("(prefers-color-scheme: dark)").matches;
      document.documentElement.classList.toggle("dark", dark);
    } catch (_) {}
  })();
</script>

<meta property="og:title" content="{{ .Site.Title }} — PWr" />
<meta property="og:description" content="{{ .Site.Params.description }}" />
<meta property="og:type" content="website" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />

<script src="https://cdn.tailwindcss.com?plugins=typography"></script>
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        fontFamily: {
          sans: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"],
          mono: ["JetBrains Mono", "ui-monospace", "monospace"],
        },
        animation: {
          "gradient-x": "gradient-x 8s ease infinite",
          "fade-in-up": "fadeInUp 0.6s ease-out forwards",
          "float": "float 6s ease-in-out infinite",
          "shimmer": "shimmer 2.5s linear infinite",
        },
        keyframes: {
          "gradient-x": {
            "0%, 100%": { "background-position": "0% 50%" },
            "50%": { "background-position": "100% 50%" },
          },
          fadeInUp: {
            "0%": { opacity: "0", transform: "translateY(20px)" },
            "100%": { opacity: "1", transform: "translateY(0)" },
          },
          float: {
            "0%, 100%": { transform: "translateY(0)" },
            "50%": { transform: "translateY(-12px)" },
          },
          shimmer: {
            "0%": { "background-position": "-1000px 0" },
            "100%": { "background-position": "1000px 0" },
          },
        },
      },
    },
  };
</script>

<link rel="stylesheet" href="{{ "css/app.css" | relURL }}" />
<link rel="icon" href="{{ "favicon.svg" | relURL }}" type="image/svg+xml" />
