<svg viewBox="0 0 340 140" class="h-full w-full">
  <defs>
    <linearGradient id="cnn-pixel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#52525b"/>
      <stop offset="1" stop-color="#3f3f46"/>
    </linearGradient>
    <radialGradient id="cnn-active" cx="0.5" cy="0.5">
      <stop offset="0" stop-color="#e879f9" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#c026d3" stop-opacity="0.2"/>
    </radialGradient>
    <marker id="cnn-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#71717a"/>
    </marker>
  </defs>

  {{/* ====== INPUT 8×8 ====== */}}
  <g transform="translate(20,30)">
    <rect width="80" height="80" rx="6" fill="#18181b" stroke="#3f3f46" stroke-width="1"/>
    {{/* varied pixel intensities */}}
    {{ range $y := (seq 0 7) }}{{ range $x := (seq 0 7) }}
      <rect x="{{ mul $x 10 | add 1 }}" y="{{ mul $y 10 | add 1 }}" width="8" height="8" rx="1"
            fill="rgba({{ mod (add (mul $x 31) (mul $y 17)) 120 | add 80 }},{{ mod (add (mul $x 23) (mul $y 41)) 100 | add 90 }},{{ mod (add (mul $x 13) (mul $y 53)) 130 | add 100 }},0.7)" />
    {{ end }}{{ end }}
    {{/* kernel 3×3 */}}
    <rect class="cnn-kernel" x="0" y="0" width="30" height="30" rx="3"
          fill="rgba(167,139,250,0.15)" stroke="#a78bfa" stroke-width="1.8">
      <animateMotion dur="7.2s" repeatCount="indefinite" calcMode="discrete"
        keyPoints="0;0.028;0.056;0.083;0.111;0.139;0.167;0.194;0.222;0.25;0.278;0.306;0.333;0.361;0.389;0.417;0.444;0.472;0.5;0.528;0.556;0.583;0.611;0.639;0.667;0.694;0.722;0.75;0.778;0.806;0.833;0.861;0.889;0.917;0.944;0.972;1"
        keyTimes="0;0.028;0.056;0.083;0.111;0.139;0.167;0.194;0.222;0.25;0.278;0.306;0.333;0.361;0.389;0.417;0.444;0.472;0.5;0.528;0.556;0.583;0.611;0.639;0.667;0.694;0.722;0.75;0.778;0.806;0.833;0.861;0.889;0.917;0.944;0.972;1"
        path="M 0,0 L 10,0 L 20,0 L 30,0 L 40,0 L 50,0 L 50,10 L 40,10 L 30,10 L 20,10 L 10,10 L 0,10 L 0,20 L 10,20 L 20,20 L 30,20 L 40,20 L 50,20 L 50,30 L 40,30 L 30,30 L 20,30 L 10,30 L 0,30 L 0,40 L 10,40 L 20,40 L 30,40 L 40,40 L 50,40 L 50,50 L 40,50 L 30,50 L 20,50 L 10,50 L 0,50 Z"/>
    </rect>
    <text x="40" y="-8" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#a1a1aa">input 8×8</text>
  </g>

  {{/* arrow + label */}}
  <g>
    <path d="M 110 70 L 150 70" stroke="#71717a" stroke-width="1.2" marker-end="url(#cnn-arr)"/>
    <text x="130" y="60" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#a1a1aa">conv 3×3</text>
    <text x="130" y="82" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="7" fill="#52525b">stride 1</text>
  </g>

  {{/* ====== FEATURE MAP 6×6 ====== */}}
  <g transform="translate(165,40)">
    <rect width="60" height="60" rx="5" fill="#18181b" stroke="#3f3f46" stroke-width="1"/>
    {{ range $y := (seq 0 5) }}{{ range $x := (seq 0 5) }}
      {{ $idx := add (mul $y 6) $x }}
      {{ $delay := div (mul $idx 72) 10.0 }}
      <rect x="{{ mul $x 10 | add 1 }}" y="{{ mul $y 10 | add 1 }}" width="8" height="8" rx="1" fill="url(#cnn-active)" opacity="0">
        <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;{{ div $delay 720 }};{{ div (add $delay 40) 720 }};0.97;1" dur="7.2s" repeatCount="indefinite"/>
      </rect>
    {{ end }}{{ end }}
    <text x="30" y="-8" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#a1a1aa">feature map 6×6</text>
  </g>

  {{/* arrow to classifier */}}
  <g>
    <path d="M 235 70 L 275 70" stroke="#71717a" stroke-width="1.2" marker-end="url(#cnn-arr)"/>
    <text x="255" y="60" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#a1a1aa">pool + fc</text>
  </g>

  {{/* ====== CLASSIFICATION BARS ====== */}}
  <g transform="translate(285,40)">
    <rect width="45" height="60" rx="5" fill="#18181b" stroke="#3f3f46" stroke-width="1"/>
    <rect x="6" y="10" width="30" height="5" rx="1" fill="#38bdf8" opacity="0.4"><animate attributeName="width" values="6;30;20;28" dur="7.2s" repeatCount="indefinite"/></rect>
    <rect x="6" y="20" width="18" height="5" rx="1" fill="#38bdf8" opacity="0.3"><animate attributeName="width" values="24;12;18;10" dur="7.2s" repeatCount="indefinite"/></rect>
    <rect x="6" y="30" width="33" height="5" rx="1" fill="#22c55e" opacity="0.9"><animate attributeName="width" values="14;22;28;33" dur="7.2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.4;0.7;0.9;1" dur="7.2s" repeatCount="indefinite"/></rect>
    <rect x="6" y="40" width="12" height="5" rx="1" fill="#38bdf8" opacity="0.3"><animate attributeName="width" values="22;16;10;8" dur="7.2s" repeatCount="indefinite"/></rect>
    <text x="22" y="-8" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#a1a1aa">softmax</text>
    <text x="42" y="34" font-family="JetBrains Mono, monospace" font-size="6" fill="#22c55e">cat</text>
  </g>
</svg>
