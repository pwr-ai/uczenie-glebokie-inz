<svg viewBox="0 0 800 320" preserveAspectRatio="xMidYMid meet" class="h-full w-full" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
  <defs>
    <radialGradient id="acnn-active" cx="0.5" cy="0.5">
      <stop offset="0" stop-color="#e879f9" stop-opacity="1"/>
      <stop offset="1" stop-color="#c026d3" stop-opacity="0.25"/>
    </radialGradient>
    <marker id="acnn-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="currentColor" opacity="0.55"/>
    </marker>
  </defs>

  {{/* Fashion-MNIST T-shirt silhouette 8×8 */}}
  {{ $img := slice
      (slice 0 1 1 0 0 1 1 0)
      (slice 1 1 1 1 1 1 1 1)
      (slice 1 1 1 1 1 1 1 1)
      (slice 0 0 1 1 1 1 0 0)
      (slice 0 0 1 1 1 1 0 0)
      (slice 0 0 1 1 1 1 0 0)
      (slice 0 0 1 1 1 1 0 0)
      (slice 0 0 1 1 1 1 0 0) }}

  {{/* ===== INPUT 8×8 ===== */}}
  <g transform="translate(50,50)">
    <rect width="200" height="200" rx="8" fill="rgba(113,113,122,0.08)" stroke="rgba(113,113,122,0.35)" stroke-width="1"/>
    {{ range $y, $row := $img }}{{ range $x, $v := $row }}
      {{ if eq $v 1 }}
        <rect x="{{ add 4 (mul $x 24) }}" y="{{ add 4 (mul $y 24) }}" width="20" height="20" rx="2" fill="currentColor" fill-opacity="0.88"/>
      {{ end }}
    {{ end }}{{ end }}
    <text x="100" y="-12" text-anchor="middle" font-size="12" fill="currentColor" opacity="0.6">obraz 8×8 — T-shirt</text>
  </g>

  {{/* ===== KERNEL 3×3 raster scan: 6×6 = 36 pozycji / 6s ===== */}}
  {{ $kpos := slice }}
  {{ range $r := (seq 0 5) }}{{ range $c := (seq 0 5) }}
    {{ $kpos = $kpos | append (printf "%d,%d" (add 54 (mul $c 24)) (add 54 (mul $r 24))) }}
  {{ end }}{{ end }}
  <g>
    <rect width="72" height="72" rx="5"
          fill="rgba(167,139,250,0.18)" stroke="#a78bfa" stroke-width="2">
      <animateTransform attributeName="transform" type="translate"
        dur="6s" repeatCount="indefinite" calcMode="discrete"
        values="{{ delimit $kpos "; " }}"/>
    </rect>
  </g>

  {{/* arrow → feature map */}}
  <g>
    <path d="M 270 150 L 330 150" stroke="currentColor" stroke-opacity="0.55" stroke-width="1.5" marker-end="url(#acnn-arr)"/>
    <text x="300" y="140" text-anchor="middle" font-size="12" fill="#a78bfa">filtr 3×3</text>
    <text x="300" y="167" text-anchor="middle" font-size="10" fill="currentColor" opacity="0.55">konwolucja</text>
  </g>

  {{/* ===== FEATURE MAP 6×6 — per-cell aktywacje (krawędzie T-shirtu) ===== */}}
  {{ $acts := slice
      (slice 0.55 0.35 0.30 0.30 0.35 0.55)
      (slice 0.95 0.80 0.70 0.70 0.80 0.95)
      (slice 0.75 0.55 0.45 0.45 0.55 0.75)
      (slice 0.35 0.60 0.25 0.25 0.60 0.35)
      (slice 0.20 0.55 0.15 0.15 0.55 0.20)
      (slice 0.15 0.45 0.10 0.10 0.45 0.15) }}
  <g transform="translate(340,70)">
    <rect width="168" height="168" rx="6" fill="rgba(113,113,122,0.08)" stroke="rgba(113,113,122,0.35)" stroke-width="1"/>
    {{ range $y, $row := $acts }}{{ range $x, $act := $row }}
      {{ $idx := add (mul $y 6) $x }}
      {{ $t := div $idx 36.0 }}
      <rect x="{{ add 6 (mul $x 27) }}" y="{{ add 6 (mul $y 27) }}" width="24" height="24" rx="3" fill="url(#acnn-active)" opacity="0">
        <animate attributeName="opacity"
          calcMode="discrete"
          values="0;{{ printf "%.2f" $act }};0"
          keyTimes="0;{{ printf "%.4f" $t }};1"
          dur="6s" repeatCount="indefinite"/>
      </rect>
    {{ end }}{{ end }}
    <text x="84" y="-12" text-anchor="middle" font-size="12" fill="currentColor" opacity="0.6">mapa cech 6×6</text>
  </g>

  {{/* arrow → classifier */}}
  <g>
    <path d="M 520 150 L 565 150" stroke="currentColor" stroke-opacity="0.55" stroke-width="1.5" marker-end="url(#acnn-arr)"/>
    <text x="542" y="140" text-anchor="middle" font-size="11" fill="currentColor" opacity="0.6">pool + fc</text>
  </g>

  {{/* ===== CLASSIFIER — softmax po 10 klasach Fashion-MNIST ===== */}}
  {{ $classes := slice "T-shirt" "Spodnie" "Sweter" "Sukienka" "Płaszcz" "Sandały" "Koszula" "Trampki" "Torba" "Kozaki" }}
  {{ $probs := slice 0.87 0.01 0.02 0.01 0.01 0.00 0.07 0.00 0.01 0.00 }}
  <g transform="translate(580,50)">
    <rect x="-8" y="-8" width="200" height="208" rx="6" fill="rgba(113,113,122,0.06)" stroke="rgba(113,113,122,0.35)" stroke-width="1"/>
    <text x="92" y="-14" text-anchor="middle" font-size="12" fill="currentColor" opacity="0.6">softmax — kategoria</text>
    {{ range $i, $c := $classes }}
      {{ $isWin := eq $i 0 }}
      {{ $barColor := "rgba(113,113,122,0.35)" }}
      {{ $strokeColor := "#52525b" }}
      {{ $labelColor := "#71717a" }}
      {{ if $isWin }}{{ $barColor = "rgba(34,197,94,0.85)" }}{{ $strokeColor = "#22c55e" }}{{ $labelColor = "#22c55e" }}{{ end }}
      <g transform="translate(0,{{ mul $i 18 }})">
        <text x="0" y="9" font-size="10" font-weight="{{ if $isWin }}bold{{ else }}normal{{ end }}" fill="{{ $labelColor }}">{{ $c }}</text>
        <rect x="58" y="2" width="120" height="10" rx="2" fill="rgba(113,113,122,0.08)" stroke="rgba(113,113,122,0.25)"/>
        <rect x="58" y="2" width="{{ mul (index $probs $i) 120 }}" height="10" rx="2" fill="{{ $barColor }}" stroke="{{ $strokeColor }}" stroke-width="0.8"/>
      </g>
    {{ end }}
  </g>
</svg>
