<svg viewBox="0 0 800 320" preserveAspectRatio="xMidYMid meet" class="h-full w-full" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
  <defs>
    <radialGradient id="acnn-active" cx="0.5" cy="0.5">
      <stop offset="0" stop-color="#e879f9" stop-opacity="1"/>
      <stop offset="1" stop-color="#c026d3" stop-opacity="0.25"/>
    </radialGradient>
    <radialGradient id="acnn-pool" cx="0.5" cy="0.5">
      <stop offset="0" stop-color="#f0abfc" stop-opacity="1"/>
      <stop offset="1" stop-color="#a21caf" stop-opacity="0.3"/>
    </radialGradient>
    <radialGradient id="acnn-hidden" cx="0.3" cy="0.3">
      <stop offset="0" stop-color="#c4b5fd"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </radialGradient>
    <marker id="acnn-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="currentColor" opacity="0.55"/>
    </marker>
    <filter id="acnn-glow"><feGaussianBlur stdDeviation="1.5"/></filter>
  </defs>

  {{/* Realna próbka Fashion-MNIST (test idx=19, klasa 0 = T-shirt)
       oryginał 28×28 → downsampling avg-pool 3×3 z centralnego 24×24 */}}
  {{ $img := slice
      (slice 0.02 0.68 0.74 0.75 0.75 0.73 0.67 0.02)
      (slice 0.31 0.81 0.76 0.75 0.79 0.77 0.74 0.24)
      (slice 0.21 0.69 0.76 0.78 0.77 0.77 0.65 0.17)
      (slice 0.00 0.29 0.77 0.76 0.78 0.88 0.25 0.00)
      (slice 0.00 0.28 0.78 0.78 0.78 0.76 0.24 0.00)
      (slice 0.00 0.28 0.79 0.79 0.79 0.77 0.25 0.00)
      (slice 0.00 0.29 0.78 0.79 0.79 0.77 0.26 0.00)
      (slice 0.00 0.26 0.77 0.77 0.77 0.77 0.26 0.00) }}

  {{/* ===== INPUT 8×8 ===== */}}
  <g transform="translate(20,60)">
    <rect width="160" height="160" rx="8" fill="rgba(113,113,122,0.08)" stroke="rgba(113,113,122,0.35)" stroke-width="1"/>
    {{ range $y, $row := $img }}{{ range $x, $v := $row }}
      {{ if gt $v 0.0 }}
        <rect x="{{ add 8 (mul $x 18) }}" y="{{ add 8 (mul $y 18) }}" width="16" height="16" rx="2" fill="currentColor" fill-opacity="{{ printf "%.2f" $v }}"/>
      {{ end }}
    {{ end }}{{ end }}
    <text x="80" y="-10" text-anchor="middle" font-size="11" fill="currentColor" opacity="0.6">obraz 8×8 — T-shirt (FMNIST)</text>
  </g>

  {{/* ===== KERNEL 3×3 z Sobel-X, raster scan: 36 pozycji / 6s ===== */}}
  {{ $kpos := slice }}
  {{ range $r := (seq 0 5) }}{{ range $c := (seq 0 5) }}
    {{ $kpos = $kpos | append (printf "%d,%d" (add 28 (mul $c 18)) (add 68 (mul $r 18))) }}
  {{ end }}{{ end }}
  <g>
    <g>
      <rect width="54" height="54" rx="5" fill="rgba(167,139,250,0.22)" stroke="#a78bfa" stroke-width="2"/>
      {{ $filter := slice
          (slice "1" "0" "-1")
          (slice "2" "0" "-2")
          (slice "1" "0" "-1") }}
      {{ range $fy, $frow := $filter }}{{ range $fx, $fv := $frow }}
        <text x="{{ add 9 (mul $fx 18) }}" y="{{ add 13 (mul $fy 18) }}" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" font-weight="bold" fill="#a78bfa">{{ $fv }}</text>
      {{ end }}{{ end }}
      <animateTransform attributeName="transform" type="translate"
        dur="6s" repeatCount="indefinite" calcMode="discrete"
        values="{{ delimit $kpos "; " }}"/>
    </g>
  </g>

  {{/* arrow → feature map */}}
  <g>
    <path d="M 180 140 L 216 140" stroke="currentColor" stroke-opacity="0.55" stroke-width="1.5" marker-end="url(#acnn-arr)"/>
    <text x="198" y="130" text-anchor="middle" font-size="10" fill="#a78bfa">splot 3×3</text>
    <text x="198" y="155" text-anchor="middle" font-size="9" fill="currentColor" opacity="0.55">Sobel-X</text>
  </g>

  {{/* ===== FEATURE MAP 6×6 ===== */}}
  {{ $acts := slice
      (slice 0.55 0.35 0.30 0.30 0.35 0.55)
      (slice 0.95 0.80 0.70 0.70 0.80 0.95)
      (slice 0.75 0.55 0.45 0.45 0.55 0.75)
      (slice 0.35 0.60 0.25 0.25 0.60 0.35)
      (slice 0.20 0.55 0.15 0.15 0.55 0.20)
      (slice 0.15 0.45 0.10 0.10 0.45 0.15) }}
  <g transform="translate(220,80)">
    <rect width="120" height="120" rx="6" fill="rgba(113,113,122,0.08)" stroke="rgba(113,113,122,0.35)" stroke-width="1"/>
    {{ range $y, $row := $acts }}{{ range $x, $act := $row }}
      {{ $idx := add (mul $y 6) $x }}
      {{ $t := div $idx 36.0 }}
      <rect x="{{ add 6 (mul $x 18) }}" y="{{ add 6 (mul $y 18) }}" width="16" height="16" rx="2" fill="url(#acnn-active)" opacity="0">
        <animate attributeName="opacity"
          calcMode="discrete"
          values="0;{{ printf "%.2f" $act }};0"
          keyTimes="0;{{ printf "%.4f" $t }};1"
          dur="6s" repeatCount="indefinite"/>
      </rect>
    {{ end }}{{ end }}
    <text x="60" y="-10" text-anchor="middle" font-size="11" fill="currentColor" opacity="0.6">mapa cech 6×6</text>
  </g>

  {{/* arrow → pooled */}}
  <g>
    <path d="M 340 140 L 376 140" stroke="currentColor" stroke-opacity="0.55" stroke-width="1.5" marker-end="url(#acnn-arr)"/>
    <text x="358" y="130" text-anchor="middle" font-size="10" fill="#e879f9">max-pool</text>
    <text x="358" y="155" text-anchor="middle" font-size="9" fill="currentColor" opacity="0.55">2×2</text>
  </g>

  {{/* ===== POOLED 3×3 ===== */}}
  {{ $pool := slice
      (slice 0.95 0.70 0.95)
      (slice 0.75 0.45 0.75)
      (slice 0.55 0.15 0.55) }}
  <g transform="translate(380,98)">
    <rect width="80" height="80" rx="6" fill="rgba(113,113,122,0.08)" stroke="rgba(113,113,122,0.35)" stroke-width="1"/>
    {{ range $y, $row := $pool }}{{ range $x, $val := $row }}
      <rect x="{{ add 6 (mul $x 23) }}" y="{{ add 6 (mul $y 23) }}" width="21" height="21" rx="3" fill="url(#acnn-pool)" fill-opacity="{{ printf "%.2f" $val }}"/>
    {{ end }}{{ end }}
    <text x="40" y="-10" text-anchor="middle" font-size="11" fill="currentColor" opacity="0.6">pool 3×3</text>
  </g>

  {{/* arrow → flatten */}}
  <g>
    <path d="M 460 140 L 486 140" stroke="currentColor" stroke-opacity="0.55" stroke-width="1.5" marker-end="url(#acnn-arr)"/>
    <text x="473" y="130" text-anchor="middle" font-size="10" fill="currentColor" opacity="0.65">flatten</text>
  </g>

  {{/* ===== FLATTEN — wektor 9×1 (komórki zapalają się sekwencyjnie) ===== */}}
  {{ $flat := slice 0.95 0.70 0.95 0.75 0.45 0.75 0.55 0.15 0.55 }}
  <g transform="translate(490,66)">
    <rect width="22" height="188" rx="4" fill="rgba(113,113,122,0.08)" stroke="rgba(113,113,122,0.35)" stroke-width="1"/>
    {{ range $i, $v := $flat }}
      {{ $t := div (add (mul $i 1.0) 0.5) 9.0 }}
      <rect x="3" y="{{ add 4 (mul $i 20) }}" width="16" height="16" rx="2" fill="url(#acnn-pool)" fill-opacity="0">
        <animate attributeName="fill-opacity"
          calcMode="discrete"
          values="0;{{ printf "%.2f" $v }};0"
          keyTimes="0;{{ printf "%.4f" $t }};1"
          dur="6s" repeatCount="indefinite"/>
      </rect>
    {{ end }}
    <text x="11" y="-8" text-anchor="middle" font-size="10" fill="currentColor" opacity="0.6">9×1</text>
  </g>

  {{/* pulsy flatten: z każdej komórki pool do odpowiedniej komórki w wektorze flat */}}
  <g filter="url(#acnn-glow)">
    {{ range $i, $v := $flat }}
      {{ $r := div $i 3 }}
      {{ $c := mod $i 3 }}
      {{ $px := add 396 (mul $c 23) }}
      {{ $py := add 114 (mul $r 23) }}
      {{ $fy := add 78 (mul $i 20) }}
      {{ $begin := div (mul $i 6.0) 9.0 }}
      <circle r="3.5" fill="#f0abfc" opacity="0">
        <animateMotion dur="6s" repeatCount="indefinite"
          begin="{{ printf "%.3fs" $begin }}"
          path="M {{ $px }},{{ $py }} L 501,{{ $fy }}" />
        <animate attributeName="opacity"
          values="0;1;1;0" keyTimes="0;0.02;0.09;0.1"
          dur="6s" repeatCount="indefinite"
          begin="{{ printf "%.3fs" $begin }}"/>
      </circle>
    {{ end }}
  </g>

  {{/* arrow → hidden (FC) */}}
  <g>
    <path d="M 514 140 L 538 140" stroke="currentColor" stroke-opacity="0.55" stroke-width="1.5" marker-end="url(#acnn-arr)"/>
    <text x="526" y="130" text-anchor="middle" font-size="10" fill="#7c3aed">FC</text>
    <text x="526" y="155" text-anchor="middle" font-size="9" fill="currentColor" opacity="0.55">+ ReLU</text>
  </g>

  {{/* edges flatten → hidden (pełne połączenie) */}}
  <g stroke="#7c3aed" stroke-width="0.5" stroke-opacity="0.22">
    {{ range $i, $v := $flat }}
      {{ $yF := add 74 (mul $i 20) }}
      {{ range $j := (seq 0 4) }}
        {{ $yH := add 90 (mul $j 28) }}
        <line x1="509" y1="{{ $yF }}" x2="550" y2="{{ $yH }}" />
      {{ end }}
    {{ end }}
  </g>

  {{/* ===== HIDDEN LAYER (5 neuronów) ===== */}}
  {{ $hidden := slice 0.85 0.45 0.70 0.30 0.60 }}
  <g>
    {{ range $i, $a := $hidden }}
      {{ $yPos := add 90 (mul $i 28) }}
      <circle cx="558" cy="{{ $yPos }}" r="10" fill="url(#acnn-hidden)" fill-opacity="{{ printf "%.2f" $a }}" stroke="#7c3aed" stroke-width="0.8"/>
    {{ end }}
    <text x="558" y="245" text-anchor="middle" font-size="10" fill="currentColor" opacity="0.6">warstwa</text>
    <text x="558" y="258" text-anchor="middle" font-size="10" fill="currentColor" opacity="0.6">ukryta</text>
  </g>

  {{/* edges hidden → classifier (dekoracyjne) */}}
  <g stroke="#7c3aed" stroke-width="0.5" stroke-opacity="0.2">
    {{ range $i, $a := $hidden }}
      {{ $yH := add 90 (mul $i 28) }}
      {{ range $j := (seq 0 9) }}
        {{ $yB := add 72 (mul $j 18) }}
        <line x1="568" y1="{{ $yH }}" x2="600" y2="{{ $yB }}" />
      {{ end }}
    {{ end }}
  </g>

  {{/* ===== CLASSIFIER — softmax po 10 klasach Fashion-MNIST ===== */}}
  {{ $classes := slice "T-shirt" "Spodnie" "Sweter" "Sukienka" "Płaszcz" "Sandały" "Koszula" "Trampki" "Torba" "Kozaki" }}
  {{ $probs := slice 0.87 0.01 0.02 0.01 0.01 0.00 0.07 0.00 0.01 0.00 }}
  <g transform="translate(602,60)">
    <rect x="-4" y="-4" width="200" height="210" rx="6" fill="rgba(113,113,122,0.06)" stroke="rgba(113,113,122,0.35)" stroke-width="1"/>
    <text x="96" y="-10" text-anchor="middle" font-size="11" fill="currentColor" opacity="0.6">softmax — kategoria</text>
    {{ range $i, $c := $classes }}
      {{ $isWin := eq $i 0 }}
      {{ $barColor := "rgba(113,113,122,0.35)" }}
      {{ $strokeColor := "#52525b" }}
      {{ $labelColor := "#71717a" }}
      {{ if $isWin }}{{ $barColor = "rgba(34,197,94,0.85)" }}{{ $strokeColor = "#22c55e" }}{{ $labelColor = "#22c55e" }}{{ end }}
      <g transform="translate(0,{{ mul $i 18 }})">
        <text x="0" y="9" font-size="10" font-weight="{{ if $isWin }}bold{{ else }}normal{{ end }}" fill="{{ $labelColor }}">{{ $c }}</text>
        <rect x="54" y="2" width="138" height="10" rx="2" fill="rgba(113,113,122,0.08)" stroke="rgba(113,113,122,0.25)"/>
        <rect x="54" y="2" width="{{ mul (index $probs $i) 138 }}" height="10" rx="2" fill="{{ $barColor }}" stroke="{{ $strokeColor }}" stroke-width="0.8"/>
      </g>
    {{ end }}
  </g>
</svg>
