<svg viewBox="0 0 340 140" class="h-full w-full">
  <defs>
    <radialGradient id="acnn-active" cx="0.5" cy="0.5">
      <stop offset="0" stop-color="#e879f9" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#c026d3" stop-opacity="0.2"/>
    </radialGradient>
    <marker id="acnn-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#71717a"/>
    </marker>
  </defs>

  {{/* ====== INPUT 8×8 ====== */}}
  <g transform="translate(20,30)">
    <rect width="80" height="80" rx="4" fill="#18181b" stroke="#3f3f46" stroke-width="1"/>
    {{ range $y := (seq 0 7) }}{{ range $x := (seq 0 7) }}
      <rect x="{{ mul $x 10 | add 1 }}" y="{{ mul $y 10 | add 1 }}" width="8" height="8" rx="1"
            fill="rgba({{ mod (add (mul $x 31) (mul $y 17)) 120 | add 80 }},{{ mod (add (mul $x 23) (mul $y 41)) 100 | add 90 }},{{ mod (add (mul $x 13) (mul $y 53)) 130 | add 100 }},0.7)" />
    {{ end }}{{ end }}
    {{/* kernel 3×3 — static at top-left */}}
    <rect x="0" y="0" width="30" height="30" rx="3" fill="rgba(167,139,250,0.22)" stroke="#a78bfa" stroke-width="1.8"/>
    <text x="40" y="-8" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#a1a1aa">input 8×8</text>
  </g>

  {{/* arrow + label */}}
  <g>
    <path d="M 110 70 L 150 70" stroke="#71717a" stroke-width="1.2" marker-end="url(#acnn-arr)"/>
    <text x="130" y="60" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#a1a1aa">conv 3×3</text>
  </g>

  {{/* ====== FEATURE MAP 6×6 — fully populated ====== */}}
  <g transform="translate(165,40)">
    <rect width="60" height="60" rx="4" fill="#18181b" stroke="#3f3f46" stroke-width="1"/>
    {{ range $y := (seq 0 5) }}{{ range $x := (seq 0 5) }}
      {{/* vary intensity a bit for visual interest */}}
      {{ $intensity := mod (add (mul $x 37) (mul $y 19)) 100 }}
      <rect x="{{ mul $x 10 | add 1 }}" y="{{ mul $y 10 | add 1 }}" width="8" height="8" rx="1" fill="url(#acnn-active)" opacity="{{ div (add $intensity 40) 140.0 }}"/>
    {{ end }}{{ end }}
    <text x="30" y="-8" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#a1a1aa">feature map 6×6</text>
  </g>

  {{/* arrow to classifier */}}
  <g>
    <path d="M 235 70 L 275 70" stroke="#71717a" stroke-width="1.2" marker-end="url(#acnn-arr)"/>
    <text x="255" y="60" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#a1a1aa">pool + fc</text>
  </g>

  {{/* ====== CLASSIFICATION BARS (static) ====== */}}
  <g transform="translate(285,40)">
    <rect width="45" height="60" rx="4" fill="#18181b" stroke="#3f3f46" stroke-width="1"/>
    <rect x="6" y="10" width="20" height="5" rx="1" fill="#38bdf8" opacity="0.4"/>
    <rect x="6" y="20" width="12" height="5" rx="1" fill="#38bdf8" opacity="0.3"/>
    <rect x="6" y="30" width="33" height="5" rx="1" fill="#22c55e" opacity="0.9"/>
    <rect x="6" y="40" width="10" height="5" rx="1" fill="#38bdf8" opacity="0.3"/>
    <text x="22" y="-8" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#a1a1aa">softmax</text>
    <text x="42" y="34" font-family="JetBrains Mono, monospace" font-size="6" fill="#22c55e">cat</text>
  </g>
</svg>
