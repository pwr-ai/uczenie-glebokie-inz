<svg viewBox="0 0 600 260" preserveAspectRatio="xMidYMid meet" class="h-full w-full">
  <defs>
    <radialGradient id="hrnn-cell" cx="0.5" cy="0.5">
      <stop offset="0" stop-color="#a78bfa" stop-opacity="1"/>
      <stop offset="1" stop-color="#7c3aed" stop-opacity="0.5"/>
    </radialGradient>
    <marker id="hrnn-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#71717a"/>
    </marker>
    <filter id="hrnn-glow"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  {{ $tokens := slice "The" "quick" "brown" "fox" "jumps" }}
  {{ $outs := slice "DET" "ADJ" "ADJ" "NOUN" "VERB" }}
  {{/* column centres spread across 600: 90, 210, 330, 450, 570 (spacing 120) */}}
  {{ $centers := slice 90 210 330 450 570 }}

  {{/* ===== TASK BANNER ===== */}}
  <g data-tip="Typowe zadanie dla sieci rekurencyjnych: dla każdego słowa w zdaniu rozpoznać, jaką jest częścią mowy — rzeczownikiem, czasownikiem, przymiotnikiem itd.">

    <rect x="20" y="6" width="280" height="20" rx="4" fill="rgba(56,189,248,0.1)" stroke="#38bdf8" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="160" y="20" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#38bdf8">zadanie: tagowanie części mowy (POS)</text>
  </g>
  <g data-tip="Prawidłowe znaczniki dla tego zdania — sieć porównuje z nimi swoje odpowiedzi i uczy się być coraz bliżej celu.">

    <rect x="320" y="6" width="260" height="20" rx="4" fill="rgba(34,197,94,0.12)" stroke="#22c55e" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="450" y="20" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#22c55e">cel: DET ADJ ADJ NOUN VERB</text>
  </g>

  {{/* ===== CURRENT-TIMESTEP COLUMN GLOW ===== */}}
  <rect x="0" y="36" width="96" height="200" rx="6" fill="rgba(251,191,36,0.08)" opacity="0">
    <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.05;0.18;0.2;1" dur="5s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate"
      dur="5s" repeatCount="indefinite" calcMode="discrete"
      keyTimes="0;0.2;0.4;0.6;0.8;1"
      values="42,0; 162,0; 282,0; 402,0; 522,0; 42,0"/>
  </rect>

  {{/* ===== RECURRENT ARROWS (h_t → h_{t+1}) ===== */}}
  {{ range $i := (seq 0 3) }}
    {{ $x1 := add (index $centers $i) 30 }}
    {{ $x2 := sub (index $centers (add $i 1)) 30 }}
    <path d="M {{ $x1 }} 140 L {{ $x2 }} 140" stroke="#52525b" stroke-width="1.2" marker-end="url(#hrnn-arr)"/>
  {{ end }}

  {{/* ===== FLOW PARTICLES on recurrent connections ===== */}}
  {{ range $i := (seq 0 3) }}
    {{ $x1 := add (index $centers $i) 30 }}
    {{ $x2 := sub (index $centers (add $i 1)) 30 }}
    {{ $begin := add (mul $i 1.0) 0.4 }}
    <circle r="2.4" fill="#fbbf24" opacity="0">
      <animate attributeName="opacity" values="0;0;1;0" keyTimes="0;{{ div $begin 5.0 }};{{ div (add $begin 0.2) 5.0 }};{{ div (add $begin 0.4) 5.0 }}" dur="5s" repeatCount="indefinite"/>
      <animateMotion dur="5s" begin="0s" repeatCount="indefinite" calcMode="linear"
        keyPoints="0;{{ div $begin 5.0 }};{{ div (add $begin 0.4) 5.0 }};1"
        keyTimes="0;{{ div $begin 5.0 }};{{ div (add $begin 0.4) 5.0 }};1"
        path="M {{ $x1 }},140 L {{ $x2 }},140 L {{ $x2 }},140 L {{ $x2 }},140"/>
    </circle>
  {{ end }}

  {{/* ===== PER-TIMESTEP GROUPS ===== */}}
  {{ range $t := (seq 0 4) }}
    {{ $cx := index $centers $t }}
    {{ $begin := mul $t 1.0 }}

    {{/* vertical input→cell arrow */}}
    <path d="M {{ $cx }} 214 L {{ $cx }} 168" stroke="#52525b" stroke-width="1.2" marker-end="url(#hrnn-arr)"/>
    {{/* input flow particle */}}
    <circle r="2.8" fill="#38bdf8" opacity="0">
      <animate attributeName="opacity" values="0;0;1;0"
        keyTimes="0;{{ div $begin 5.0 }};{{ div (add $begin 0.15) 5.0 }};{{ div (add $begin 0.3) 5.0 }}"
        dur="5s" repeatCount="indefinite"/>
      <animateMotion dur="5s" repeatCount="indefinite" calcMode="linear"
        keyPoints="0;{{ div $begin 5.0 }};{{ div (add $begin 0.3) 5.0 }};1"
        keyTimes="0;{{ div $begin 5.0 }};{{ div (add $begin 0.3) 5.0 }};1"
        path="M {{ $cx }},210 L {{ $cx }},170 L {{ $cx }},170 L {{ $cx }},170"/>
    </circle>

    {{/* vertical cell→output arrow */}}
    <path d="M {{ $cx }} 112 L {{ $cx }} 60" stroke="#52525b" stroke-width="1.2" marker-end="url(#hrnn-arr)"/>
    {{/* output flow particle */}}
    <circle r="2.8" fill="#22c55e" opacity="0">
      <animate attributeName="opacity" values="0;0;1;0"
        keyTimes="0;{{ div (add $begin 0.5) 5.0 }};{{ div (add $begin 0.65) 5.0 }};{{ div (add $begin 0.8) 5.0 }}"
        dur="5s" repeatCount="indefinite"/>
      <animateMotion dur="5s" repeatCount="indefinite" calcMode="linear"
        keyPoints="0;{{ div (add $begin 0.5) 5.0 }};{{ div (add $begin 0.8) 5.0 }};1"
        keyTimes="0;{{ div (add $begin 0.5) 5.0 }};{{ div (add $begin 0.8) 5.0 }};1"
        path="M {{ $cx }},110 L {{ $cx }},60 L {{ $cx }},60 L {{ $cx }},60"/>
    </circle>

    {{/* INPUT x_t */}}
    <g data-tip="Jedno słowo ze zdania. Sieć rekurencyjna czyta tekst po jednym słowie, krok po kroku.">

      <rect x="{{ sub $cx 32 }}" y="216" width="64" height="22" rx="5" fill="#18181b" stroke="#52525b" stroke-width="1"/>
      <rect x="{{ sub $cx 32 }}" y="216" width="64" height="22" rx="5"
            fill="rgba(56,189,248,0.25)" stroke="#38bdf8" stroke-width="1.5" opacity="0">
        <animate attributeName="opacity" values="0;0;1;0"
          keyTimes="0;{{ div $begin 5.0 }};{{ div (add $begin 0.25) 5.0 }};{{ div (add $begin 0.9) 5.0 }}"
          dur="5s" repeatCount="indefinite"/>
      </rect>
      <text x="{{ $cx }}" y="231" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#d4d4d8">{{ index $tokens $t }}</text>
    </g>

    {{/* HIDDEN CELL with mini bars */}}
    <g data-tip="„Pamięć“ sieci po przeczytaniu danego słowa. Zawiera informacje z całego dotychczasowego kontekstu i przekazuje je dalej — do analizy kolejnego słowa.">

      <g filter="url(#hrnn-glow)">
        <rect x="{{ sub $cx 30 }}" y="112" width="60" height="56" rx="7" fill="#27272a" stroke="#52525b" stroke-width="1"/>
        <rect x="{{ sub $cx 30 }}" y="112" width="60" height="56" rx="7" fill="url(#hrnn-cell)" opacity="0">
          <animate attributeName="opacity" values="0;0;0.8;0.3;0"
            keyTimes="0;{{ div (add $begin 0.15) 5.0 }};{{ div (add $begin 0.35) 5.0 }};{{ div (add $begin 0.7) 5.0 }};{{ div (add $begin 0.95) 5.0 }}"
            dur="5s" repeatCount="indefinite"/>
        </rect>
        {{ $h_finals := slice
            (slice 18 10 22 14)
            (slice 20 24 8 16)
            (slice 12 28 18 10)
            (slice 26 14 20 22)
            (slice 16 20 14 26) }}
        {{ $hvals := index $h_finals $t }}
        {{ range $d := (seq 0 3) }}
          {{ $bx := add (sub $cx 24) (mul $d 12) }}
          {{ $h := index $hvals $d }}
          <rect x="{{ $bx }}" y="{{ sub 160 $h }}" width="7" height="{{ $h }}" rx="1" fill="#f4f4f5" opacity="0.25">
            <animate attributeName="height" values="4;{{ $h }}"
              keyTimes="{{ div $begin 5.0 }};{{ div (add $begin 0.35) 5.0 }}"
              dur="5s" repeatCount="indefinite"/>
            <animate attributeName="y" values="156;{{ sub 160 $h }}"
              keyTimes="{{ div $begin 5.0 }};{{ div (add $begin 0.35) 5.0 }}"
              dur="5s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0.15;0.9;0.5;0.15"
              keyTimes="{{ div $begin 5.0 }};{{ div (add $begin 0.35) 5.0 }};{{ div (add $begin 0.7) 5.0 }};{{ div (add $begin 0.95) 5.0 }}"
              dur="5s" repeatCount="indefinite"/>
          </rect>
        {{ end }}
        <text x="{{ $cx }}" y="106" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#a1a1aa">h<tspan font-size="6" dy="2">{{ $t }}</tspan></text>
      </g>
    </g>

    {{/* OUTPUT y_t with confidence bar */}}
    <g data-tip="Odpowiedź sieci dla tego słowa — jakiej jest części mowy. Zielony pasek pod spodem pokazuje, jak pewna jest tej odpowiedzi.">

      <rect x="{{ sub $cx 32 }}" y="34" width="64" height="26" rx="5" fill="#18181b" stroke="#52525b" stroke-width="1"/>
      <rect x="{{ sub $cx 32 }}" y="34" width="64" height="26" rx="5"
            fill="rgba(34,197,94,0.2)" stroke="#22c55e" stroke-width="1.5" opacity="0">
        <animate attributeName="opacity" values="0;0;1;0.3"
          keyTimes="0;{{ div (add $begin 0.5) 5.0 }};{{ div (add $begin 0.7) 5.0 }};{{ div (add $begin 0.95) 5.0 }}"
          dur="5s" repeatCount="indefinite"/>
      </rect>
      <text x="{{ $cx }}" y="48" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#d4d4d8">{{ index $outs $t }}</text>
      <rect x="{{ sub $cx 22 }}" y="52" width="44" height="3" rx="1" fill="#18181b"/>
      <rect x="{{ sub $cx 22 }}" y="52" width="0" height="3" rx="1" fill="#22c55e">
        <animate attributeName="width" values="0;0;40" keyTimes="0;{{ div (add $begin 0.55) 5.0 }};{{ div (add $begin 0.8) 5.0 }}" dur="5s" repeatCount="indefinite"/>
      </rect>
    </g>
  {{ end }}

  {{/* ===== ROW LABELS (Polish) ===== */}}
  <g font-family="JetBrains Mono, monospace" font-size="9" fill="#71717a">
    <g data-tip="Wiersz wyjściowy — przewidywane znaczniki dla każdego słowa.">
      <text x="8" y="48" font-weight="bold" fill="#22c55e">y</text>
      <text x="18" y="48">wyjście</text>
    </g>
    <g data-tip="Stan wewnętrzny — „pamięć“ sieci w każdej chwili. Przechowuje to, co istotne z dotychczasowej sekwencji.">
      <text x="8" y="145" font-weight="bold" fill="#a78bfa">h</text>
      <text x="18" y="145">stan</text>
    </g>
    <g data-tip="Wiersz wejściowy — słowa trafiające do sieci jedno po drugim.">
      <text x="8" y="232" font-weight="bold" fill="#38bdf8">x</text>
      <text x="18" y="232">wejście</text>
    </g>
  </g>

  {{/* ===== DASHED RECURRENT LOOP HINT ===== */}}
  <g data-tip="Rekurencja — stan z poprzedniego kroku wpływa na analizę kolejnego. Dzięki temu sieć traktuje zdanie jako całość, a nie zbiór niezależnych słów.">

    <path d="M 90 110 C 90 85, 210 85, 240 110" stroke="#fbbf24" stroke-width="1.2" fill="none" stroke-dasharray="4,3" opacity="0.4">
      <animate attributeName="stroke-dashoffset" values="0;-14" dur="1.2s" repeatCount="indefinite"/>
    </path>
  </g>
</svg>
