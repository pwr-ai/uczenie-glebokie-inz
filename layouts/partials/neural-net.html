<svg id="net-svg" viewBox="0 0 600 260" preserveAspectRatio="xMidYMid meet" class="h-full w-full">
  <defs>
    <linearGradient id="edge" x1="0" x2="1">
      <stop offset="0" stop-color="#a78bfa" stop-opacity="0.08" />
      <stop offset="0.5" stop-color="#e879f9" stop-opacity="0.5" />
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0.08" />
    </linearGradient>
    <radialGradient id="node-v" cx="0.3" cy="0.3"><stop offset="0" stop-color="#c4b5fd" /><stop offset="1" stop-color="#7c3aed" /></radialGradient>
    <radialGradient id="node-f" cx="0.3" cy="0.3"><stop offset="0" stop-color="#f0abfc" /><stop offset="1" stop-color="#c026d3" /></radialGradient>
    <radialGradient id="node-s" cx="0.3" cy="0.3"><stop offset="0" stop-color="#7dd3fc" /><stop offset="1" stop-color="#0284c7" /></radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2.5" result="b" /><feMerge><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge></filter>
  </defs>

  {{/* ===== TASK BANNER ===== */}}
  <g data-tip="Przykładowe zadanie dla prostej sieci gęstej: na podstawie kilku cech wiadomości odróżnić wiadomości normalne („ham“) od spamu.">
    <rect x="20" y="6" width="240" height="20" rx="4" fill="rgba(56,189,248,0.1)" stroke="#38bdf8" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="140" y="20" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#38bdf8">zadanie: klasyfikacja e-maili (spam / ham)</text>
  </g>
  <g data-tip="Prawidłowa odpowiedź dla tego przykładu. Sieć porównuje z nią swoje predykcje, żeby wiedzieć, w którą stronę poprawiać wagi.">
    <rect x="280" y="6" width="110" height="20" rx="4" fill="rgba(34,197,94,0.12)" stroke="#22c55e" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="335" y="20" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#22c55e">cel: ham ✓</text>
  </g>

  {{/* ===== LAYER X-COORDS (widened to fit features+classes) ===== */}}
  {{/* features: 60 | fc1: 220 | fc2: 340 | out: 460 | softmax: 510+ */}}
  {{ $l1 := slice 80 130 180 230 }}
  {{ $l2 := slice 65 115 165 215 }}
  {{ $l3 := slice 100 170 240 }}
  {{ $l4 := slice 130 200 }}

  {{/* ===== FEATURE LABELS — numeric values shown next to input nodes ===== */}}
  {{ $feats := slice
      (dict "name" "n_$$$"     "val" "3"   "desc" "Liczba wystąpień znaków „$$$\" w treści wiadomości — jedna z cech, na którą sieć może zwrócić uwagę.")
      (dict "name" "n_links"   "val" "5"   "desc" "Liczba linków w wiadomości. Sieć sama oceni, czy to coś istotnego dla decyzji.")
      (dict "name" "has_offer" "val" "1"   "desc" "Czy pojawiają się słowa typu „oferta\" lub „promocja\" (1 = tak, 0 = nie).")
      (dict "name" "unk_sender" "val" "0"  "desc" "Czy nadawca jest znany odbiorcy (0 = tak, 1 = nie).") }}
  <g font-family="JetBrains Mono, monospace">
    {{ range $i, $f := $feats }}
      {{ $y := index $l1 $i }}
      <g data-tip="{{ $f.desc }} Wartość: {{ $f.val }}">
        <rect x="6" y="{{ sub $y 9 }}" width="44" height="18" rx="3" fill="#18181b" stroke="#52525b" stroke-width="0.8"/>
        <text x="10" y="{{ add $y 3 }}" font-size="8" fill="#71717a">{{ $f.name }}</text>
        <text x="45" y="{{ add $y 3 }}" text-anchor="end" font-size="9" font-weight="bold" fill="#38bdf8">{{ $f.val }}</text>
      </g>
    {{ end }}
    <text x="28" y="248" text-anchor="middle" font-size="8" fill="#71717a">features</text>
  </g>

  {{/* ===== EDGES ===== */}}
  <g stroke="url(#edge)" stroke-width="1" opacity="0.55">
    {{ range $y1 := $l1 }}{{ range $y2 := $l2 }}<line x1="60" y1="{{ $y1 }}" x2="220" y2="{{ $y2 }}" />{{ end }}{{ end }}
    {{ range $y1 := $l2 }}{{ range $y2 := $l3 }}<line x1="220" y1="{{ $y1 }}" x2="340" y2="{{ $y2 }}" />{{ end }}{{ end }}
    {{ range $y1 := $l3 }}{{ range $y2 := $l4 }}<line x1="340" y1="{{ $y1 }}" x2="460" y2="{{ $y2 }}" />{{ end }}{{ end }}
  </g>

  {{/* ===== FORWARD PULSES ===== */}}
  <g class="net-forward" filter="url(#glow)" opacity="1">
    <circle r="3" fill="#a78bfa"><animateMotion dur="2.2s" repeatCount="indefinite" path="M60,80 L220,65" /></circle>
    <circle r="3" fill="#a78bfa"><animateMotion dur="2.6s" begin="0.2s" repeatCount="indefinite" path="M60,130 L220,115" /></circle>
    <circle r="3" fill="#a78bfa"><animateMotion dur="2.4s" begin="0.6s" repeatCount="indefinite" path="M60,180 L220,165" /></circle>
    <circle r="3" fill="#a78bfa"><animateMotion dur="2.8s" begin="1s" repeatCount="indefinite" path="M60,230 L220,215" /></circle>
    <circle r="3" fill="#e879f9"><animateMotion dur="2.4s" begin="0.4s" repeatCount="indefinite" path="M220,115 L340,100" /></circle>
    <circle r="3" fill="#e879f9"><animateMotion dur="2s" begin="0.9s" repeatCount="indefinite" path="M220,165 L340,170" /></circle>
    <circle r="3" fill="#e879f9"><animateMotion dur="2.6s" begin="1.3s" repeatCount="indefinite" path="M220,215 L340,240" /></circle>
    <circle r="3.5" fill="#38bdf8"><animateMotion dur="2s" begin="0.7s" repeatCount="indefinite" path="M340,100 L460,130" /></circle>
    <circle r="3.5" fill="#38bdf8"><animateMotion dur="2.2s" begin="1.5s" repeatCount="indefinite" path="M340,170 L460,200" /></circle>
  </g>

  {{/* ===== BACKWARD PULSES ===== */}}
  <g class="net-backward" filter="url(#glow)" opacity="0">
    <circle r="3" fill="#fbbf24"><animateMotion dur="1.6s" repeatCount="indefinite" path="M460,130 L340,100" /></circle>
    <circle r="3" fill="#fbbf24"><animateMotion dur="1.8s" begin="0.2s" repeatCount="indefinite" path="M460,200 L340,170" /></circle>
    <circle r="3" fill="#f59e0b"><animateMotion dur="1.6s" begin="0.4s" repeatCount="indefinite" path="M340,100 L220,115" /></circle>
    <circle r="3" fill="#f59e0b"><animateMotion dur="1.8s" begin="0.7s" repeatCount="indefinite" path="M340,170 L220,165" /></circle>
    <circle r="3" fill="#f59e0b"><animateMotion dur="1.6s" begin="1s" repeatCount="indefinite" path="M340,240 L220,215" /></circle>
    <circle r="3" fill="#f97316"><animateMotion dur="1.6s" begin="0.9s" repeatCount="indefinite" path="M220,115 L60,80" /></circle>
    <circle r="3" fill="#f97316"><animateMotion dur="1.8s" begin="1.2s" repeatCount="indefinite" path="M220,165 L60,180" /></circle>
  </g>

  {{/* ===== STEP INDICATOR ===== */}}
  <g class="net-step" opacity="0">
    {{ range $y := $l2 }}<circle cx="220" cy="{{ $y }}" r="12" fill="none" stroke="#a78bfa" stroke-width="1.2" opacity="0.6"><animate attributeName="r" from="8" to="16" dur="1s" repeatCount="indefinite"/><animate attributeName="opacity" from="0.7" to="0" dur="1s" repeatCount="indefinite"/></circle>{{ end }}
    {{ range $y := $l3 }}<circle cx="340" cy="{{ $y }}" r="12" fill="none" stroke="#e879f9" stroke-width="1.2" opacity="0.6"><animate attributeName="r" from="8" to="16" dur="1s" begin="0.3s" repeatCount="indefinite"/><animate attributeName="opacity" from="0.7" to="0" dur="1s" begin="0.3s" repeatCount="indefinite"/></circle>{{ end }}
  </g>

  {{/* ===== NODES ===== */}}
  <g filter="url(#glow)">
    {{ range $y := $l1 }}<circle cx="60" cy="{{ $y }}" r="7" fill="url(#node-v)" />{{ end }}
    {{ range $y := $l2 }}<circle cx="220" cy="{{ $y }}" r="7" fill="url(#node-f)" />{{ end }}
    {{ range $y := $l3 }}<circle cx="340" cy="{{ $y }}" r="7" fill="url(#node-f)" />{{ end }}
    {{ range $y := $l4 }}<circle cx="460" cy="{{ $y }}" r="9" fill="url(#node-s)" />{{ end }}
  </g>

  {{/* ===== PHASE INDICATOR DOT ===== */}}
  <circle id="net-phase-dot" cx="580" cy="15" r="4" fill="#34d399" opacity="0.9">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="1.6s" repeatCount="indefinite"/>
  </circle>

  {{/* ===== OUTPUT CLASS LABELS ===== */}}
  <g font-family="JetBrains Mono, monospace" font-size="10" font-weight="bold">
    <text x="478" y="134" fill="#22c55e">ham</text>
    <text x="478" y="204" fill="#71717a">spam</text>
  </g>

  {{/* ===== SOFTMAX PANEL (right side) ===== */}}
  <g transform="translate(490,40)" data-tip="Softmax to ostatni krok: zamienia surowe wyniki sieci w prawdopodobieństwa, które sumują się do 1. Sieć wybiera klasę o największym prawdopodobieństwie.">
    <rect x="-6" y="-10" width="110" height="170" rx="6" fill="#0a0a0a" stroke="#3f3f46" stroke-width="1"/>
    <text x="50" y="-14" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#a1a1aa">softmax</text>

    {{/* HAM (winning) */}}
    <g transform="translate(0,14)">
      <text x="2" y="0" font-family="JetBrains Mono, monospace" font-size="9" font-weight="bold" fill="#22c55e">ham ✓</text>
      <rect x="2" y="6" width="94" height="6" rx="2" fill="#18181b" stroke="#27272a"/>
      <rect x="2" y="6" width="35" height="6" rx="2" fill="rgba(34,197,94,0.85)" stroke="#22c55e">
        <animate attributeName="width" values="35;90" keyTimes="0.1;1" dur="5s" repeatCount="indefinite"/>
      </rect>
      <text x="96" y="5" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="8" fill="#22c55e">
        <tspan>
          <animate attributeName="opacity" values="0.4;1" keyTimes="0.1;1" dur="5s" repeatCount="indefinite"/>
          0.94
        </tspan>
      </text>
    </g>

    {{/* SPAM (losing) */}}
    <g transform="translate(0,42)">
      <text x="2" y="0" font-family="JetBrains Mono, monospace" font-size="9" fill="#71717a">spam</text>
      <rect x="2" y="6" width="94" height="6" rx="2" fill="#18181b" stroke="#27272a"/>
      <rect x="2" y="6" width="59" height="6" rx="2" fill="rgba(113,113,122,0.4)" stroke="#52525b">
        <animate attributeName="width" values="59;6" keyTimes="0.1;1" dur="5s" repeatCount="indefinite"/>
      </rect>
      <text x="96" y="5" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="8" fill="#71717a">0.06</text>
    </g>

    {{/* DECISION */}}
    <g transform="translate(0,78)">
      <rect x="2" y="0" width="94" height="22" rx="4" fill="rgba(34,197,94,0.15)" stroke="#22c55e" stroke-width="1"/>
      <text x="49" y="15" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" font-weight="bold" fill="#22c55e">decyzja: ham</text>
    </g>

    {{/* CONFIDENCE */}}
    <g transform="translate(0,112)">
      <text x="2" y="0" font-family="JetBrains Mono, monospace" font-size="8" fill="#71717a">confidence</text>
      <text x="96" y="0" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="9" font-weight="bold" fill="#22c55e">94%</text>
    </g>
  </g>

  {{/* ===== LAYER LABELS (with tooltips) ===== */}}
  <g font-family="JetBrains Mono, monospace" font-size="8" fill="#71717a">
    <g data-tip="Warstwa wejściowa — tu pojawiają się liczby opisujące wiadomość. Każdy z węzłów odpowiada jednej cesze.">
      <rect x="30" y="244" width="60" height="14" rx="3" fill="transparent"/>
      <text x="60" y="254" text-anchor="middle">input</text>
    </g>
    <g data-tip="Pierwsza warstwa sieci. Każdy z jej neuronów łączy wartości cech w nowy sposób i w trakcie uczenia dopasowuje, które kombinacje pomagają odróżniać klasy. ReLU to prosta funkcja aktywacji.">
      <rect x="190" y="244" width="60" height="14" rx="3" fill="transparent"/>
      <text x="220" y="254" text-anchor="middle">fc1 (ReLU)</text>
    </g>
    <g data-tip="Druga warstwa — tworzy kombinacje tego, co odkryła poprzednia. Im więcej warstw, tym bardziej złożone wzorce sieć może opisać.">
      <rect x="310" y="244" width="60" height="14" rx="3" fill="transparent"/>
      <text x="340" y="254" text-anchor="middle">fc2 (ReLU)</text>
    </g>
    <g data-tip="Wyjście sieci — dwie liczby, po jednej dla każdej klasy. Większa wartość oznacza większe przekonanie sieci o tej odpowiedzi.">
      <rect x="430" y="244" width="60" height="14" rx="3" fill="transparent"/>
      <text x="460" y="254" text-anchor="middle">output</text>
    </g>
  </g>
</svg>
