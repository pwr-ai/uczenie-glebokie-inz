<svg id="net-svg" viewBox="0 0 400 260" preserveAspectRatio="xMidYMid meet" class="h-full w-full">
  <defs>
    <linearGradient id="edge" x1="0" x2="1">
      <stop offset="0" stop-color="#a78bfa" stop-opacity="0.08" />
      <stop offset="0.5" stop-color="#e879f9" stop-opacity="0.5" />
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0.08" />
    </linearGradient>
    <radialGradient id="node-v" cx="0.3" cy="0.3"><stop offset="0" stop-color="#c4b5fd" /><stop offset="1" stop-color="#7c3aed" /></radialGradient>
    <radialGradient id="node-f" cx="0.3" cy="0.3"><stop offset="0" stop-color="#f0abfc" /><stop offset="1" stop-color="#c026d3" /></radialGradient>
    <radialGradient id="node-s" cx="0.3" cy="0.3"><stop offset="0" stop-color="#7dd3fc" /><stop offset="1" stop-color="#0284c7" /></radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2.5" result="b" /><feMerge><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge></filter>
    <filter id="soft"><feGaussianBlur stdDeviation="1.5" /></filter>
  </defs>

  {{/* layers — y-coords (260 tall card) */}}
  {{ $l1 := slice 40 100 160 220 }}
  {{ $l2 := slice 25 85 145 205 }}
  {{ $l3 := slice 60 130 200 }}
  {{ $l4 := slice 100 160 }}

  {{/* edges */}}
  <g stroke="url(#edge)" stroke-width="1" opacity="0.55">
    {{ range $y1 := $l1 }}{{ range $y2 := $l2 }}<line x1="60" y1="{{ $y1 }}" x2="160" y2="{{ $y2 }}" />{{ end }}{{ end }}
    {{ range $y1 := $l2 }}{{ range $y2 := $l3 }}<line x1="160" y1="{{ $y1 }}" x2="260" y2="{{ $y2 }}" />{{ end }}{{ end }}
    {{ range $y1 := $l3 }}{{ range $y2 := $l4 }}<line x1="260" y1="{{ $y1 }}" x2="360" y2="{{ $y2 }}" />{{ end }}{{ end }}
  </g>

  {{/* forward pulses (violet → fuchsia → sky), shown when phase=forward */}}
  <g class="net-forward" filter="url(#glow)" opacity="1">
    <circle r="3" fill="#a78bfa"><animateMotion dur="2.2s" repeatCount="indefinite" path="M60,40 L160,25" /></circle>
    <circle r="3" fill="#a78bfa"><animateMotion dur="2.6s" begin="0.2s" repeatCount="indefinite" path="M60,100 L160,85" /></circle>
    <circle r="3" fill="#a78bfa"><animateMotion dur="2.4s" begin="0.6s" repeatCount="indefinite" path="M60,160 L160,145" /></circle>
    <circle r="3" fill="#a78bfa"><animateMotion dur="2.8s" begin="1s" repeatCount="indefinite" path="M60,220 L160,205" /></circle>
    <circle r="3" fill="#e879f9"><animateMotion dur="2.4s" begin="0.4s" repeatCount="indefinite" path="M160,85 L260,60" /></circle>
    <circle r="3" fill="#e879f9"><animateMotion dur="2s" begin="0.9s" repeatCount="indefinite" path="M160,145 L260,130" /></circle>
    <circle r="3" fill="#e879f9"><animateMotion dur="2.6s" begin="1.3s" repeatCount="indefinite" path="M160,205 L260,200" /></circle>
    <circle r="3.5" fill="#38bdf8"><animateMotion dur="2s" begin="0.7s" repeatCount="indefinite" path="M260,60 L360,100" /></circle>
    <circle r="3.5" fill="#38bdf8"><animateMotion dur="2.2s" begin="1.5s" repeatCount="indefinite" path="M260,130 L360,160" /></circle>
  </g>

  {{/* backward pulses (amber), shown when phase=backward — travel right→left */}}
  <g class="net-backward" filter="url(#glow)" opacity="0">
    <circle r="3" fill="#fbbf24"><animateMotion dur="1.6s" repeatCount="indefinite" path="M360,100 L260,60" /></circle>
    <circle r="3" fill="#fbbf24"><animateMotion dur="1.8s" begin="0.2s" repeatCount="indefinite" path="M360,160 L260,130" /></circle>
    <circle r="3" fill="#f59e0b"><animateMotion dur="1.6s" begin="0.4s" repeatCount="indefinite" path="M260,60 L160,85" /></circle>
    <circle r="3" fill="#f59e0b"><animateMotion dur="1.8s" begin="0.7s" repeatCount="indefinite" path="M260,130 L160,145" /></circle>
    <circle r="3" fill="#f59e0b"><animateMotion dur="1.6s" begin="1s" repeatCount="indefinite" path="M260,200 L160,205" /></circle>
    <circle r="3" fill="#f97316"><animateMotion dur="1.6s" begin="0.9s" repeatCount="indefinite" path="M160,85 L60,40" /></circle>
    <circle r="3" fill="#f97316"><animateMotion dur="1.8s" begin="1.2s" repeatCount="indefinite" path="M160,145 L60,160" /></circle>
  </g>

  {{/* step / update indicator — small rings around nodes */}}
  <g class="net-step" opacity="0">
    {{ range $y := $l2 }}<circle cx="160" cy="{{ $y }}" r="12" fill="none" stroke="#a78bfa" stroke-width="1.2" opacity="0.6"><animate attributeName="r" from="8" to="16" dur="1s" repeatCount="indefinite"/><animate attributeName="opacity" from="0.7" to="0" dur="1s" repeatCount="indefinite"/></circle>{{ end }}
    {{ range $y := $l3 }}<circle cx="260" cy="{{ $y }}" r="12" fill="none" stroke="#e879f9" stroke-width="1.2" opacity="0.6"><animate attributeName="r" from="8" to="16" dur="1s" begin="0.3s" repeatCount="indefinite"/><animate attributeName="opacity" from="0.7" to="0" dur="1s" begin="0.3s" repeatCount="indefinite"/></circle>{{ end }}
  </g>

  {{/* nodes */}}
  <g filter="url(#glow)">
    {{ range $y := $l1 }}<circle cx="60" cy="{{ $y }}" r="7" fill="url(#node-v)" />{{ end }}
    {{ range $y := $l2 }}<circle cx="160" cy="{{ $y }}" r="7" fill="url(#node-f)" />{{ end }}
    {{ range $y := $l3 }}<circle cx="260" cy="{{ $y }}" r="7" fill="url(#node-f)" />{{ end }}
    {{ range $y := $l4 }}<circle cx="360" cy="{{ $y }}" r="9" fill="url(#node-s)" />{{ end }}
  </g>

  {{/* phase indicator dot — color set by JS */}}
  <circle id="net-phase-dot" cx="380" cy="15" r="4" fill="#34d399" opacity="0.9">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="1.6s" repeatCount="indefinite"/>
  </circle>

  {{/* ===== CLASSIFICATION HEAD — softmax of the 2 output nodes ===== */}}
  {{/* target banner */}}
  <g>
    <rect x="325" y="10" width="70" height="18" rx="4" fill="rgba(34,197,94,0.12)" stroke="#22c55e" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="360" y="23" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#22c55e">target: A</text>
  </g>
  {{/* class labels next to output nodes */}}
  <g font-family="JetBrains Mono, monospace" font-size="10">
    <text x="378" y="104" fill="#22c55e" font-weight="bold">A</text>
    <text x="378" y="164" fill="#71717a">B</text>
  </g>
  {{/* animated softmax bars (converging toward class A winning) */}}
  <g transform="translate(90, 225)">
    <rect x="-6" y="-14" width="230" height="28" rx="5" fill="#0a0a0a" stroke="#3f3f46" stroke-width="1"/>
    <text x="0" y="-18" font-family="JetBrains Mono, monospace" font-size="8" fill="#a1a1aa">softmax</text>
    {{/* A (winning) */}}
    <text x="4" y="-2" font-family="JetBrains Mono, monospace" font-size="8" fill="#22c55e">A</text>
    <rect x="18" y="-8" width="180" height="8" rx="2" fill="#18181b" stroke="#27272a"/>
    <rect x="18" y="-8" width="36" height="8" rx="2" fill="rgba(34,197,94,0.85)" stroke="#22c55e">
      <animate attributeName="width" values="36;172" keyTimes="0.1;1" dur="5s" repeatCount="indefinite"/>
    </rect>
    {{/* B (losing) */}}
    <text x="4" y="10" font-family="JetBrains Mono, monospace" font-size="8" fill="#71717a">B</text>
    <rect x="18" y="4" width="180" height="8" rx="2" fill="#18181b" stroke="#27272a"/>
    <rect x="18" y="4" width="144" height="8" rx="2" fill="rgba(113,113,122,0.4)" stroke="#52525b">
      <animate attributeName="width" values="144;8" keyTimes="0.1;1" dur="5s" repeatCount="indefinite"/>
    </rect>
  </g>

  {{/* labels */}}
  <g font-family="JetBrains Mono, monospace" font-size="8" fill="#71717a">
    <text x="60" y="250" text-anchor="middle">input</text>
    <text x="160" y="250" text-anchor="middle">fc1</text>
    <text x="260" y="250" text-anchor="middle">fc2</text>
    <text x="360" y="250" text-anchor="middle">out</text>
  </g>
</svg>
