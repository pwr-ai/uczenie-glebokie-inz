<svg viewBox="0 0 340 140" class="h-full w-full">
  <defs>
    <linearGradient id="attn-edge" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#e879f9" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#a78bfa" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  {{ $tokens := slice "I" "love" "deep" "learning" "very" "much" }}
  {{/* 6 tokens, centres at 30, 80, 130, 180, 230, 280 */}}
  {{ $positions := slice 30 80 130 180 230 280 }}

  {{/* ===== INPUT tokens (bottom) ===== */}}
  {{ range $i, $p := $positions }}
    <g>
      <rect x="{{ sub $p 20 }}" y="100" width="40" height="22" rx="4" fill="#27272a" stroke="#52525b" stroke-width="1"/>
      <text x="{{ $p }}" y="115" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#e4e4e7">{{ index $tokens $i }}</text>
    </g>
  {{ end }}

  {{/* ===== OUTPUT tokens (top) — each with its own attention cycle ===== */}}
  {{ range $i, $p := $positions }}
    {{ $begin := mul $i 1.0 }}
    <g>
      <rect x="{{ sub $p 20 }}" y="18" width="40" height="22" rx="4" fill="#18181b" stroke="#3f3f46" stroke-width="1"/>
      {{/* glow when this token is the query */}}
      <rect x="{{ sub $p 20 }}" y="18" width="40" height="22" rx="4" fill="rgba(232,121,249,0.18)" stroke="#e879f9" stroke-width="1.5" opacity="0">
        <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;{{ div $begin 6.0 }};{{ div (add $begin 0.1) 6.0 }};{{ div (add $begin 0.85) 6.0 }};{{ div (add $begin 0.95) 6.0 }}" dur="6s" repeatCount="indefinite"/>
      </rect>
      <text x="{{ $p }}" y="33" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#a1a1aa">y<tspan font-size="6" dy="2">{{ $i }}</tspan></text>
    </g>
  {{ end }}

  {{/* ===== ATTENTION EDGES — for each query i, draw edges to all 6 inputs ===== */}}
  {{ range $i, $qp := $positions }}
    {{ $begin := mul $i 1.0 }}
    {{ range $j, $kp := $positions }}
      {{/* attention weight varies — diagonal stronger, farther weaker; give some variety */}}
      {{ $d := sub $i $j }}{{ if lt $d 0 }}{{ $d = sub 0 $d }}{{ end }}
      {{ $w := div 1.0 (add 1 $d) }}
      {{/* add bias: subject-verb pairs get extra weight */}}
      {{ if or (and (eq $i 3) (eq $j 0)) (and (eq $i 3) (eq $j 2)) (and (eq $i 1) (eq $j 3)) }}
        {{ $w = 0.9 }}
      {{ end }}
      <path d="M {{ $qp }} 40 C {{ $qp }} 70, {{ $kp }} 70, {{ $kp }} 100"
            fill="none" stroke="url(#attn-edge)" stroke-width="{{ mul $w 2.4 | add 0.4 }}" opacity="0">
        <animate attributeName="opacity" values="0;0;{{ $w }};{{ $w }};0"
          keyTimes="0;{{ div (add $begin 0.1) 6.0 }};{{ div (add $begin 0.2) 6.0 }};{{ div (add $begin 0.85) 6.0 }};{{ div (add $begin 0.95) 6.0 }}"
          dur="6s" repeatCount="indefinite"/>
      </path>
    {{ end }}
  {{ end }}

  {{/* labels */}}
  <text x="10" y="15" font-family="JetBrains Mono, monospace" font-size="8" fill="#71717a">output</text>
  <text x="10" y="135" font-family="JetBrains Mono, monospace" font-size="8" fill="#71717a">tokens</text>

  {{/* "attention heads" hint (3 dots) */}}
  <g transform="translate(320,70)">
    <circle cx="0" cy="-6" r="1.8" fill="#e879f9" opacity="0.8"/>
    <circle cx="0" cy="0" r="1.8" fill="#a78bfa" opacity="0.8"/>
    <circle cx="0" cy="6" r="1.8" fill="#38bdf8" opacity="0.8"/>
    <text x="-3" y="20" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="6" fill="#71717a">heads</text>
  </g>
</svg>
