<svg viewBox="0 0 480 480" class="h-full w-full" preserveAspectRatio="xMidYMid meet">
  <defs>
    <radialGradient id="hh-halo" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0"    stop-color="#a78bfa" stop-opacity="0.28"/>
      <stop offset="0.55" stop-color="#d946ef" stop-opacity="0.14"/>
      <stop offset="1"    stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hh-edge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a78bfa" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0.55"/>
    </linearGradient>

    {{/* one clean node gradient per layer — subtle, not dramatic */}}
    <radialGradient id="hh-c1" cx="0.35" cy="0.35"><stop offset="0" stop-color="#c4b5fd"/><stop offset="1" stop-color="#7c3aed"/></radialGradient>
    <radialGradient id="hh-c2" cx="0.35" cy="0.35"><stop offset="0" stop-color="#d8b4fe"/><stop offset="1" stop-color="#9333ea"/></radialGradient>
    <radialGradient id="hh-c3" cx="0.35" cy="0.35"><stop offset="0" stop-color="#f0abfc"/><stop offset="1" stop-color="#c026d3"/></radialGradient>
    <radialGradient id="hh-c4" cx="0.35" cy="0.35"><stop offset="0" stop-color="#c084fc"/><stop offset="1" stop-color="#a855f7"/></radialGradient>
    <radialGradient id="hh-c5" cx="0.35" cy="0.35"><stop offset="0" stop-color="#7dd3fc"/><stop offset="1" stop-color="#0ea5e9"/></radialGradient>

    <filter id="hh-bloom" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="hh-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  {{/* ambient backdrop */}}
  <circle cx="240" cy="240" r="220" fill="url(#hh-halo)" filter="url(#hh-bloom)"/>

  {{ $l1 := slice 170 240 310 }}
  {{ $l2 := slice 130 200 270 340 }}
  {{ $l3 := slice 130 200 270 340 }}
  {{ $l4 := slice 170 240 310 }}
  {{ $l5 := slice 210 270 }}

  {{/* ============== fully-connected curved edges ============== */}}
  <g stroke="url(#hh-edge)" stroke-width="1" fill="none" opacity="0.55">
    {{ range $y1 := $l1 }}{{ range $y2 := $l2 }}
      <path d="M 70 {{ $y1 }} C 115 {{ $y1 }}, 115 {{ $y2 }}, 160 {{ $y2 }}"/>
    {{ end }}{{ end }}
    {{ range $y1 := $l2 }}{{ range $y2 := $l3 }}
      <path d="M 160 {{ $y1 }} C 210 {{ $y1 }}, 210 {{ $y2 }}, 260 {{ $y2 }}"/>
    {{ end }}{{ end }}
    {{ range $y1 := $l3 }}{{ range $y2 := $l4 }}
      <path d="M 260 {{ $y1 }} C 310 {{ $y1 }}, 310 {{ $y2 }}, 360 {{ $y2 }}"/>
    {{ end }}{{ end }}
    {{ range $y1 := $l4 }}{{ range $y2 := $l5 }}
      <path d="M 360 {{ $y1 }} C 390 {{ $y1 }}, 390 {{ $y2 }}, 420 {{ $y2 }}"/>
    {{ end }}{{ end }}
  </g>

  {{/* ============== simple clean nodes — one gradient circle each ============== */}}
  <g filter="url(#hh-glow)">
    {{ range $y := $l1 }}<circle cx="70"  cy="{{ $y }}" r="9"  fill="url(#hh-c1)"/>{{ end }}
    {{ range $y := $l2 }}<circle cx="160" cy="{{ $y }}" r="9"  fill="url(#hh-c2)"/>{{ end }}
    {{ range $y := $l3 }}<circle cx="260" cy="{{ $y }}" r="9"  fill="url(#hh-c3)"/>{{ end }}
    {{ range $y := $l4 }}<circle cx="360" cy="{{ $y }}" r="9"  fill="url(#hh-c4)"/>{{ end }}
    {{ range $y := $l5 }}<circle cx="420" cy="{{ $y }}" r="11" fill="url(#hh-c5)"/>{{ end }}
  </g>

  {{/* ============== flowing comets along curved paths ============== */}}
  <g filter="url(#hh-glow)">
    {{ $flows := slice
        (dict "p" "M 70 170 C 115 170, 115 130, 160 130 C 210 130, 210 130, 260 130 C 310 130, 310 170, 360 170 C 390 170, 390 210, 420 210" "begin" "0s"   "color" "#c4b5fd")
        (dict "p" "M 70 240 C 115 240, 115 270, 160 270 C 210 270, 210 270, 260 270 C 310 270, 310 240, 360 240 C 390 240, 390 270, 420 270" "begin" "0.7s" "color" "#e879f9")
        (dict "p" "M 70 310 C 115 310, 115 340, 160 340 C 210 340, 210 340, 260 340 C 310 340, 310 310, 360 310 C 390 310, 390 270, 420 270" "begin" "1.4s" "color" "#7dd3fc")
        (dict "p" "M 70 170 C 115 170, 115 200, 160 200 C 210 200, 210 200, 260 200 C 310 200, 310 240, 360 240 C 390 240, 390 210, 420 210" "begin" "2.1s" "color" "#f0abfc")
        (dict "p" "M 70 240 C 115 240, 115 200, 160 200 C 210 200, 210 200, 260 200 C 310 200, 310 170, 360 170 C 390 170, 390 210, 420 210" "begin" "2.8s" "color" "#a78bfa") }}
    {{ range $flows }}
      <circle r="3.5" fill="{{ .color }}">
        <animateMotion dur="5s" begin="{{ .begin }}" repeatCount="indefinite" path="{{ .p }}"/>
        <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="5s" begin="{{ .begin }}" repeatCount="indefinite"/>
      </circle>
    {{ end }}
  </g>
</svg>
