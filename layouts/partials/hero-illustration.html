<svg viewBox="0 0 480 480" class="h-full w-full" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="hh-edge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a78bfa" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0.8"/>
    </linearGradient>
    <radialGradient id="hh-node" cx="0.35" cy="0.3">
      <stop offset="0"    stop-color="#ddd6fe"/>
      <stop offset="0.55" stop-color="#a78bfa"/>
      <stop offset="1"    stop-color="#6d28d9"/>
    </radialGradient>
    <radialGradient id="hh-halo" cx="0.5" cy="0.5" r="0.55">
      <stop offset="0"   stop-color="#a78bfa" stop-opacity="0.18"/>
      <stop offset="0.7" stop-color="#d946ef" stop-opacity="0.07"/>
      <stop offset="1"   stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  {{/* ambient backdrop */}}
  <circle cx="240" cy="240" r="220" fill="url(#hh-halo)"/>

  {{ $l1 := slice 170 240 310 }}
  {{ $l2 := slice 130 200 270 340 }}
  {{ $l3 := slice 130 200 270 340 }}
  {{ $l4 := slice 170 240 310 }}
  {{ $l5 := slice 210 270 }}

  {{/* ============== FULLY connected straight edges — every node in each layer
       connects to every node in the next. Stroke bumped so it reads clearly. ============== */}}
  <g stroke="url(#hh-edge)" stroke-width="1.3" opacity="0.85">
    {{ range $y1 := $l1 }}{{ range $y2 := $l2 }}<line x1="70"  y1="{{ $y1 }}" x2="160" y2="{{ $y2 }}"/>{{ end }}{{ end }}
    {{ range $y1 := $l2 }}{{ range $y2 := $l3 }}<line x1="160" y1="{{ $y1 }}" x2="260" y2="{{ $y2 }}"/>{{ end }}{{ end }}
    {{ range $y1 := $l3 }}{{ range $y2 := $l4 }}<line x1="260" y1="{{ $y1 }}" x2="360" y2="{{ $y2 }}"/>{{ end }}{{ end }}
    {{ range $y1 := $l4 }}{{ range $y2 := $l5 }}<line x1="360" y1="{{ $y1 }}" x2="420" y2="{{ $y2 }}"/>{{ end }}{{ end }}
  </g>

  {{/* ============== nodes — single violet gradient, clean and cohesive ============== */}}
  <g fill="url(#hh-node)">
    {{ range $y := $l1 }}<circle cx="70"  cy="{{ $y }}" r="8"/>{{ end }}
    {{ range $y := $l2 }}<circle cx="160" cy="{{ $y }}" r="8"/>{{ end }}
    {{ range $y := $l3 }}<circle cx="260" cy="{{ $y }}" r="8"/>{{ end }}
    {{ range $y := $l4 }}<circle cx="360" cy="{{ $y }}" r="8"/>{{ end }}
    {{ range $y := $l5 }}<circle cx="420" cy="{{ $y }}" r="9"/>{{ end }}
  </g>

  {{/* ============== 3 comets — straight polyline paths so they sit EXACTLY on the edge lines ============== */}}
  <g>
    {{ $flows := slice
        (dict "p" "M 70 170 L 160 130 L 260 130 L 360 170 L 420 210" "begin" "0s"   "color" "#c4b5fd")
        (dict "p" "M 70 240 L 160 270 L 260 270 L 360 240 L 420 270" "begin" "1.2s" "color" "#e879f9")
        (dict "p" "M 70 310 L 160 340 L 260 340 L 360 310 L 420 270" "begin" "2.4s" "color" "#7dd3fc") }}
    {{ range $flows }}
      <circle r="3" fill="{{ .color }}">
        <animateMotion dur="5s" begin="{{ .begin }}" repeatCount="indefinite" path="{{ .p }}"/>
      </circle>
    {{ end }}
  </g>
</svg>
