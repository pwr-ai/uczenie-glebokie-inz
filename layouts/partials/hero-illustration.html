<svg viewBox="0 0 400 400" class="h-full w-full" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="heroi-glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="heroi-edge" x1="0" x2="1">
      <stop offset="0" stop-color="#a78bfa" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0.35"/>
    </linearGradient>
    <radialGradient id="heroi-node-v" cx="0.3" cy="0.3">
      <stop offset="0" stop-color="#c4b5fd"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </radialGradient>
    <radialGradient id="heroi-node-f" cx="0.3" cy="0.3">
      <stop offset="0" stop-color="#f0abfc"/>
      <stop offset="1" stop-color="#c026d3"/>
    </radialGradient>
    <radialGradient id="heroi-node-s" cx="0.3" cy="0.3">
      <stop offset="0" stop-color="#7dd3fc"/>
      <stop offset="1" stop-color="#0284c7"/>
    </radialGradient>
    <filter id="heroi-glowf"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>

  {{/* subtle background orb */}}
  <circle cx="200" cy="200" r="160" fill="url(#heroi-glow)" opacity="0.08" filter="url(#heroi-glowf)"/>

  {{ $l1 := slice 80 150 220 290 }}
  {{ $l2 := slice 100 170 240 }}
  {{ $l3 := slice 130 210 }}
  {{ $l4 := slice 200 }}

  {{/* edges */}}
  <g stroke="url(#heroi-edge)" stroke-width="1.2">
    {{ range $y1 := $l1 }}{{ range $y2 := $l2 }}<line x1="80" y1="{{ $y1 }}" x2="170" y2="{{ $y2 }}" />{{ end }}{{ end }}
    {{ range $y1 := $l2 }}{{ range $y2 := $l3 }}<line x1="170" y1="{{ $y1 }}" x2="260" y2="{{ $y2 }}" />{{ end }}{{ end }}
    {{ range $y1 := $l3 }}{{ range $y2 := $l4 }}<line x1="260" y1="{{ $y1 }}" x2="340" y2="{{ $y2 }}" />{{ end }}{{ end }}
  </g>

  {{/* nodes */}}
  <g filter="url(#heroi-glowf)">
    {{ range $y := $l1 }}<circle cx="80" cy="{{ $y }}" r="9" fill="url(#heroi-node-v)"/>{{ end }}
    {{ range $y := $l2 }}<circle cx="170" cy="{{ $y }}" r="9" fill="url(#heroi-node-f)"/>{{ end }}
    {{ range $y := $l3 }}<circle cx="260" cy="{{ $y }}" r="9" fill="url(#heroi-node-f)"/>{{ end }}
    {{ range $y := $l4 }}<circle cx="340" cy="{{ $y }}" r="12" fill="url(#heroi-node-s)"/>{{ end }}
  </g>
</svg>
