<svg viewBox="0 0 340 140" class="h-full w-full">
  <defs>
    <radialGradient id="cam-hot" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0"   stop-color="#ef4444" stop-opacity="0.85"/>
      <stop offset="0.5" stop-color="#f59e0b" stop-opacity="0.55"/>
      <stop offset="1"   stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <filter id="cam-blur"><feGaussianBlur stdDeviation="4"/></filter>
  </defs>

  {{ $digit := slice
      (slice 0 1 1 1 1 1 0)
      (slice 1 0 0 0 0 1 0)
      (slice 0 0 0 0 1 0 0)
      (slice 0 0 1 1 0 0 0)
      (slice 0 0 0 0 1 0 0)
      (slice 1 0 0 0 0 1 0)
      (slice 0 1 1 1 1 0 0) }}

  {{/* LEFT — original input */}}
  <g transform="translate(18,22)">
    <rect width="98" height="98" rx="5" fill="#0a0a0a" stroke="#3f3f46" stroke-width="1"/>
    {{ range $y, $row := $digit }}{{ range $x, $v := $row }}
      {{ $fill := "#18181b" }}
      {{ if eq $v 1 }}{{ $fill = "#f4f4f5" }}{{ end }}
      <rect x="{{ add 1 (mul $x 14) }}" y="{{ add 1 (mul $y 14) }}" width="12" height="12" rx="1.5" fill="{{ $fill }}"/>
    {{ end }}{{ end }}
    <text x="49" y="-6" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#a1a1aa">input</text>
  </g>

  <path d="M 130 70 L 150 70" stroke="#71717a" stroke-width="1.3"/>
  <path d="M 147 66 L 152 70 L 147 74 Z" fill="#71717a"/>

  {{/* MIDDLE — input + static heatmap */}}
  <g transform="translate(160,22)">
    <rect width="98" height="98" rx="5" fill="#0a0a0a" stroke="#3f3f46" stroke-width="1"/>
    {{ range $y, $row := $digit }}{{ range $x, $v := $row }}
      {{ $fill := "#18181b" }}
      {{ if eq $v 1 }}{{ $fill = "rgba(244,244,245,0.45)" }}{{ end }}
      <rect x="{{ add 1 (mul $x 14) }}" y="{{ add 1 (mul $y 14) }}" width="12" height="12" rx="1.5" fill="{{ $fill }}"/>
    {{ end }}{{ end }}
    <g filter="url(#cam-blur)">
      <circle cx="55" cy="45" r="16" fill="url(#cam-hot)" opacity="0.7"/>
      <circle cx="50" cy="80" r="14" fill="url(#cam-hot)" opacity="0.55"/>
      <circle cx="30" cy="20" r="10" fill="url(#cam-hot)" opacity="0.4"/>
    </g>
    <text x="49" y="-6" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#ef4444">Grad-CAM</text>
  </g>

  {{/* RIGHT — prediction */}}
  <g transform="translate(275,30)">
    <rect x="-4" y="-4" width="60" height="80" rx="5" fill="#0a0a0a" stroke="#3f3f46" stroke-width="1"/>
    <text x="26" y="10" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#a1a1aa">decyzja</text>
    <text x="26" y="38" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="24" font-weight="bold" fill="#22c55e">3</text>
    <text x="26" y="56" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="7" fill="#71717a">dlaczego?</text>
    <text x="26" y="68" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="7" fill="#ef4444">⬆ czerwone</text>
  </g>

  <text x="170" y="135" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#71717a">jasność czerwonego = istotność pikselu</text>
</svg>
