<svg viewBox="0 0 800 320" preserveAspectRatio="xMidYMid meet" class="h-full w-full" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
  <defs>
    <radialGradient id="cam-hot" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0"   stop-color="#ef4444" stop-opacity="0.9"/>
      <stop offset="0.5" stop-color="#f59e0b" stop-opacity="0.55"/>
      <stop offset="1"   stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <filter id="cam-blur"><feGaussianBlur stdDeviation="9"/></filter>
    <marker id="cam-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="currentColor" opacity="0.55"/>
    </marker>
  </defs>

  {{ $digit := slice
      (slice 0 1 1 1 1 1 0)
      (slice 1 0 0 0 0 1 0)
      (slice 0 0 0 0 1 0 0)
      (slice 0 0 1 1 0 0 0)
      (slice 0 0 0 0 1 0 0)
      (slice 1 0 0 0 0 1 0)
      (slice 0 1 1 1 1 0 0) }}

  {{/* LEFT — original input */}}
  <g transform="translate(60,60)">
    <rect width="200" height="200" rx="8" fill="rgba(113,113,122,0.06)" stroke="rgba(113,113,122,0.35)" stroke-width="1"/>
    {{ range $y, $row := $digit }}{{ range $x, $v := $row }}
      {{ $fill := "transparent" }}
      {{ if eq $v 1 }}{{ $fill = "#f4f4f5" }}{{ end }}
      <rect x="{{ add 4 (mul $x 28) }}" y="{{ add 4 (mul $y 28) }}" width="24" height="24" rx="3" fill="{{ $fill }}"/>
    {{ end }}{{ end }}
    <text x="100" y="-14" text-anchor="middle" font-size="12" fill="currentColor" opacity="0.6">wejście</text>
  </g>

  {{/* arrow → */}}
  <g>
    <path d="M 290 160 L 350 160" stroke="currentColor" stroke-opacity="0.55" stroke-width="1.5" marker-end="url(#cam-arr)"/>
    <text x="320" y="150" text-anchor="middle" font-size="11" fill="currentColor" opacity="0.6">Grad-CAM</text>
  </g>

  {{/* MIDDLE — input + pulsing heatmap */}}
  <g transform="translate(360,60)">
    <rect width="200" height="200" rx="8" fill="rgba(113,113,122,0.06)" stroke="rgba(113,113,122,0.35)" stroke-width="1"/>
    {{/* faded digit under heatmap */}}
    {{ range $y, $row := $digit }}{{ range $x, $v := $row }}
      {{ $fill := "transparent" }}
      {{ if eq $v 1 }}{{ $fill = "rgba(244,244,245,0.4)" }}{{ end }}
      <rect x="{{ add 4 (mul $x 28) }}" y="{{ add 4 (mul $y 28) }}" width="24" height="24" rx="3" fill="{{ $fill }}"/>
    {{ end }}{{ end }}

    {{/* heatmap blobs — pulsing opacity */}}
    <g filter="url(#cam-blur)">
      <circle cx="112" cy="92" r="34" fill="url(#cam-hot)">
        <animate attributeName="opacity" values="0.35;0.95;0.35" dur="4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="100" cy="162" r="28" fill="url(#cam-hot)">
        <animate attributeName="opacity" values="0.25;0.8;0.25" dur="4s" begin="0.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="60" cy="40" r="22" fill="url(#cam-hot)">
        <animate attributeName="opacity" values="0.15;0.65;0.15" dur="4s" begin="1.6s" repeatCount="indefinite"/>
      </circle>
    </g>

    <text x="100" y="-14" text-anchor="middle" font-size="12" fill="#ef4444">mapa cieplna</text>
  </g>

  {{/* arrow → */}}
  <g>
    <path d="M 590 160 L 640 160" stroke="currentColor" stroke-opacity="0.55" stroke-width="1.5" marker-end="url(#cam-arr)"/>
  </g>

  {{/* RIGHT — decision */}}
  <g transform="translate(650,80)">
    <rect x="-4" y="-4" width="120" height="160" rx="8" fill="rgba(113,113,122,0.06)" stroke="rgba(113,113,122,0.35)" stroke-width="1"/>
    <text x="56" y="16" text-anchor="middle" font-size="12" fill="currentColor" opacity="0.6">decyzja</text>
    <text x="56" y="70" text-anchor="middle" font-size="52" font-weight="bold" fill="#22c55e">3</text>
    <text x="56" y="110" text-anchor="middle" font-size="10" fill="currentColor" opacity="0.55">dlaczego?</text>
    <text x="56" y="128" text-anchor="middle" font-size="10" fill="#ef4444">⬅ istotne piksele</text>
  </g>
</svg>
